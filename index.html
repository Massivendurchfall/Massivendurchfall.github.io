<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects | Massivendurchfall</title>
  <meta name="description" content="Project hub for Android APKs, games and web tools.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Projects | Massivendurchfall">
  <meta property="og:description" content="Android APKs, SurfFishing and web projects in one hub.">
  <meta property="og:url" content="https://massivendurchfall.github.io/">
  <meta name="theme-color" content="#0f1222">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #070912;
      --bg-1: #141a34;
      --bg-2: #1f2954;
      --grid: rgba(255, 255, 255, 0.08);
      --panel: rgba(14, 18, 38, 0.86);
      --stroke: rgba(184, 207, 255, 0.28);
      --text: #eef3ff;
      --muted: #a7b6de;
      --apk: #84ffb4;
      --web: #6fd7ff;
      --game: #ffbf79;
      --repo: #ff8f87;
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      background:
        radial-gradient(36rem 20rem at 15% -8%, rgba(255, 191, 121, 0.2), transparent 60%),
        radial-gradient(30rem 24rem at 88% 8%, rgba(111, 215, 255, 0.18), transparent 62%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black 52%, transparent 100%);
    }

    .wrap {
      width: min(1040px, 93vw);
      margin: 0 auto;
      padding: 28px 0 54px;
      position: relative;
    }

    .hero {
      position: relative;
      border: 1px solid var(--stroke);
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border-radius: 28px;
      padding: 24px 20px 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      right: -24px;
      top: -20px;
      background: radial-gradient(circle, rgba(255, 143, 135, 0.46), rgba(255, 143, 135, 0));
      pointer-events: none;
    }

    .knot {
      display: inline-block;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #10142d;
      background: linear-gradient(135deg, #9cf4ff, #d6f2ff);
      border: 1px solid rgba(156, 244, 255, 0.62);
      border-radius: 999px;
      padding: 7px 11px;
    }

    h1 {
      margin-top: 13px;
      font-family: "Unbounded", sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 0.95;
      font-size: clamp(2rem, 8vw, 4rem);
      text-transform: uppercase;
    }

    .hero p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 760px;
      font-size: 0.92rem;
    }

    .repo-btn {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2e0705;
      background: linear-gradient(135deg, var(--repo), #ffd1cc);
      border: 1px solid rgba(255, 143, 135, 0.78);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 24px rgba(255, 143, 135, 0.34);
      transition: transform 0.2s ease;
    }

    .repo-btn:hover,
    .repo-btn:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .section {
      margin-top: 24px;
    }

    .section-head {
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .section-head h2 {
      font-family: "Unbounded", sans-serif;
      font-size: clamp(1.05rem, 4.8vw, 1.65rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-head p {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 11px;
    }

    .card {
      border: 1px solid var(--stroke);
      background: var(--panel);
      border-radius: 16px;
      padding: 13px;
      display: grid;
      gap: 9px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
      transform: translateY(8px);
      opacity: 0;
      animation: show 0.45s ease forwards;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .chip {
      border-radius: 10px;
      padding: 5px 9px;
      font-size: 0.71rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .chip.apk {
      background: linear-gradient(135deg, var(--apk), #d8ffe8);
      color: #062412;
      border-color: rgba(132, 255, 180, 0.74);
    }

    .chip.web {
      background: linear-gradient(135deg, var(--web), #cff3ff);
      color: #052031;
      border-color: rgba(111, 215, 255, 0.74);
    }

    .chip.game {
      background: linear-gradient(135deg, var(--game), #ffe4c2);
      color: #311a03;
      border-color: rgba(255, 191, 121, 0.74);
    }

    .info {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.52;
      overflow-wrap: anywhere;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
      transition: transform 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .btn-apk {
      background: linear-gradient(135deg, var(--apk), #dbffea);
      border-color: rgba(132, 255, 180, 0.76);
      color: #062412;
    }

    .btn-game {
      background: linear-gradient(135deg, var(--game), #ffe7c8);
      border-color: rgba(255, 191, 121, 0.76);
      color: #311a03;
    }

    .btn-muted {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.24);
      color: var(--text);
    }

    footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.77rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .wrap { padding-top: 18px; }
      .hero { padding: 18px 14px; }
      .hero p { font-size: 0.86rem; }
      .card { padding: 11px; }
      .title { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="knot">curated launch board</span>
      <h1>My Projects</h1>
      <p>Distinct hub for your Android APKs, custom game builds and browser projects.</p>
      <a class="repo-btn" href="https://github.com/Massivendurchfall?tab=repositories" target="_blank" rel="noopener">
        Open My GitHub Repositories
      </a>
    </section>

    <section class="section" aria-labelledby="apps-title">
      <div class="section-head">
        <h2 id="apps-title">Phone Apps</h2>
        <p>Android APKs only</p>
      </div>
      <div class="stack" id="appLinks"></div>
    </section>

    <section class="section" aria-labelledby="games-title">
      <div class="section-head">
        <h2 id="games-title">Games</h2>
        <p>Windows build</p>
      </div>
      <div class="stack" id="gameLinks"></div>
    </section>

    <section class="section" aria-labelledby="web-title">
      <div class="section-head">
        <h2 id="web-title">Web Projects</h2>
        <p>5 live pages</p>
      </div>
      <div class="stack" id="webLinks"></div>
    </section>

    <footer>massivendurchfall.github.io</footer>
  </main>

  <script>
    const BASE = "https://massivendurchfall.github.io";

    const appProjects = [
      {
        title: "GhostChat APK",
        note: "Anonymous chat app.",
        filePath: "/andriod/ghostchat.apk",
        pagePath: "/andriod/",
        tag: "APK"
      },
      {
        title: "S.to APK",
        note: "App for s.to, ad-free and lightweight.",
        filePath: "/andriod/s.to.apk",
        pagePath: "/andriod/",
        tag: "APK"
      }
    ];

    const games = [
      {
        title: "Suffishing",
        note: "Self-made game. Download the SurfFishing.exe build.",
        filePath: "/games/SurfFishing.exe",
        pagePath: "/games/",
        tag: "Game"
      }
    ];

    const webProjects = [
      { title: "Chess", note: "Calculates the best moves with Stockfish.", path: "/chess/", tag: "Web" },
      { title: "Counter", note: "Easy number counter.", path: "/counter/", tag: "Web" },
      { title: "PVZ", note: "Plants vs Zombies Replanted download page.", path: "/pvz/", tag: "Web" },
      { title: "Ryujinx", note: "Tutorial page for emulator installation.", path: "/ryjinx/", tag: "Web" },
      { title: "Shooter", note: "Small freestyle shooter.", path: "/shooter/", tag: "Web" }
    ];

    const appContainer = document.getElementById("appLinks");
    const gameContainer = document.getElementById("gameLinks");
    const webContainer = document.getElementById("webLinks");

    function appCard(item, delay) {
      const node = document.createElement("article");
      node.className = "card";
      node.style.animationDelay = `${delay}s`;
      node.innerHTML = `
        <div class="top">
          <span class="title">${item.title}</span>
          <span class="chip apk">${item.tag}</span>
        </div>
        <p class="info">${item.note}<br>${BASE + item.filePath}</p>
        <div class="btn-row">
          <a class="btn btn-apk" href="${BASE + item.filePath}" download>Download APK</a>
          <a class="btn btn-muted" href="${BASE + item.pagePath}">Open App Page</a>
        </div>
      `;
      return node;
    }

    function gameCard(item, delay) {
      const node = document.createElement("article");
      node.className = "card";
      node.style.animationDelay = `${delay}s`;
      node.innerHTML = `
        <div class="top">
          <span class="title">${item.title}</span>
          <span class="chip game">${item.tag}</span>
        </div>
        <p class="info">${item.note}<br>${BASE + item.filePath}</p>
        <div class="btn-row">
          <a class="btn btn-game" href="${BASE + item.filePath}" download>Download EXE</a>
          <a class="btn btn-muted" href="${BASE + item.pagePath}">Open Game Page</a>
        </div>
      `;
      return node;
    }

    function webCard(item, delay) {
      const node = document.createElement("article");
      node.className = "card";
      node.style.animationDelay = `${delay}s`;
      node.innerHTML = `
        <div class="top">
          <span class="title">${item.title}</span>
          <span class="chip web">${item.tag}</span>
        </div>
        <p class="info">${item.note}<br>${BASE + item.path}</p>
        <div class="btn-row">
          <a class="btn btn-muted" href="${BASE + item.path}">Open Project</a>
        </div>
      `;
      return node;
    }

    appProjects.forEach((item, i) => appContainer.appendChild(appCard(item, 0.07 + i * 0.05)));
    games.forEach((item, i) => gameContainer.appendChild(gameCard(item, 0.17 + i * 0.05)));
    webProjects.forEach((item, i) => webContainer.appendChild(webCard(item, 0.22 + i * 0.04)));
  </script>
</body>
</html>
