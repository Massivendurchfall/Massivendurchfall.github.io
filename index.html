<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects | Massivendurchfall</title>
  <meta name="description" content="Automatic project hub showing all public GitHub repositories.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Projects | Massivendurchfall">
  <meta property="og:description" content="All public repositories from Massivendurchfall in one hub.">
  <meta property="og:url" content="https://massivendurchfall.github.io/">
  <meta name="theme-color" content="#0f1222">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #070912;
      --bg-1: #141a34;
      --bg-2: #1f2954;
      --grid: rgba(255, 255, 255, 0.08);
      --panel: rgba(14, 18, 38, 0.86);
      --stroke: rgba(184, 207, 255, 0.28);
      --text: #eef3ff;
      --muted: #a7b6de;
      --apk: #84ffb4;
      --web: #6fd7ff;
      --game: #ffbf79;
      --repo: #ff8f87;
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      background:
        radial-gradient(36rem 20rem at 15% -8%, rgba(255, 191, 121, 0.2), transparent 60%),
        radial-gradient(30rem 24rem at 88% 8%, rgba(111, 215, 255, 0.18), transparent 62%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black 52%, transparent 100%);
    }

    .wrap {
      width: min(1040px, 93vw);
      margin: 0 auto;
      padding: 28px 0 54px;
      position: relative;
    }

    .hero {
      position: relative;
      border: 1px solid var(--stroke);
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border-radius: 28px;
      padding: 24px 20px 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      right: -24px;
      top: -20px;
      background: radial-gradient(circle, rgba(255, 143, 135, 0.46), rgba(255, 143, 135, 0));
      pointer-events: none;
    }

    .knot {
      display: inline-block;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #10142d;
      background: linear-gradient(135deg, #9cf4ff, #d6f2ff);
      border: 1px solid rgba(156, 244, 255, 0.62);
      border-radius: 999px;
      padding: 7px 11px;
    }

    h1 {
      margin-top: 13px;
      font-family: "Unbounded", sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 0.95;
      font-size: clamp(2rem, 8vw, 4rem);
      text-transform: uppercase;
    }

    .hero p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 760px;
      font-size: 0.92rem;
    }

    .repo-btn {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2e0705;
      background: linear-gradient(135deg, var(--repo), #ffd1cc);
      border: 1px solid rgba(255, 143, 135, 0.78);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 24px rgba(255, 143, 135, 0.34);
      transition: transform 0.2s ease;
    }

    .repo-btn:hover,
    .repo-btn:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .section {
      margin-top: 24px;
    }

    .section-head {
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .section-head h2 {
      font-family: "Unbounded", sans-serif;
      font-size: clamp(1.05rem, 4.8vw, 1.65rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-head p {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 11px;
    }

    .card {
      border: 1px solid var(--stroke);
      background: var(--panel);
      border-radius: 16px;
      padding: 13px;
      display: grid;
      gap: 9px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
      transform: translateY(8px);
      opacity: 0;
      animation: show 0.45s ease forwards;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .chip {
      border-radius: 10px;
      padding: 5px 9px;
      font-size: 0.71rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .chip.apk {
      background: linear-gradient(135deg, var(--apk), #d8ffe8);
      color: #062412;
      border-color: rgba(132, 255, 180, 0.74);
    }

    .chip.web {
      background: linear-gradient(135deg, var(--web), #cff3ff);
      color: #052031;
      border-color: rgba(111, 215, 255, 0.74);
    }

    .chip.game {
      background: linear-gradient(135deg, var(--game), #ffe4c2);
      color: #311a03;
      border-color: rgba(255, 191, 121, 0.74);
    }

    .chip.repo {
      background: linear-gradient(135deg, var(--repo), #ffd8d2);
      color: #2e0705;
      border-color: rgba(255, 143, 135, 0.78);
    }

    .info {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.52;
      overflow-wrap: anywhere;
    }

    .meta {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
      transition: transform 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .btn-apk {
      background: linear-gradient(135deg, var(--apk), #dbffea);
      border-color: rgba(132, 255, 180, 0.76);
      color: #062412;
    }

    .btn-game {
      background: linear-gradient(135deg, var(--game), #ffe7c8);
      border-color: rgba(255, 191, 121, 0.76);
      color: #311a03;
    }

    .btn-muted {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.24);
      color: var(--text);
    }

    footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.77rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .wrap { padding-top: 18px; }
      .hero { padding: 18px 14px; }
      .hero p { font-size: 0.86rem; }
      .card { padding: 11px; }
      .title { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="knot">curated launch board</span>
      <h1>My Projects</h1>
      <p>Automatic overview of all public repositories from your GitHub profile.</p>
      <a class="repo-btn" href="https://github.com/Massivendurchfall?tab=repositories" target="_blank" rel="noopener">
        Open My GitHub Repositories
      </a>
    </section>

    <section class="section" aria-labelledby="repos-title">
      <div class="section-head">
        <h2 id="repos-title">All GitHub Projects</h2>
        <p id="repoCount">Loading...</p>
      </div>
      <div class="stack" id="repoLinks"></div>
    </section>

    <footer>massivendurchfall.github.io</footer>
  </main>

  <script>
    const USERNAME = "Massivendurchfall";
    const repoContainer = document.getElementById("repoLinks");
    const repoCount = document.getElementById("repoCount");
    const ROOT_REPO = "Massivendurchfall.github.io";

    const fallbackDescriptions = {
      "Massivendurchfall.github.io": "Main website hub with web tools, game pages and Android download sections.",
      "Soundcloud-Windows": "Unofficial SoundCloud desktop wrapper for Windows.",
      "discord-auto-quest": "Automatically completes Discord quests.",
      "ryujinxinstaller": "Installs keys and emulator automatically. Details are usually in the README.",
      "EAID-Quick-Renamer": "Quick rename tool for EA IDs and account labels.",
      "Discord-Name-Checker": "Checks Discord names for availability, format or matching rules.",
      "cuddly-enigma": "Experimental utility project and playground repository.",
      "gw2-monitor": "Monitoring helper for Guild Wars 2 related status or events.",
      "Configs-Dead-by-Daylight": "Custom config collection for Dead by Daylight.",
      "Mc-name-checker": "Minecraft name checking helper tool.",
      "Discord-Server-Cloner": "Tooling for cloning Discord server structures and channels.",
      "External-Discord-Overlay-with-ImGui": "External overlay project for Discord built with ImGui.",
      "vrchat-osc-spotify": "VRChat OSC bridge integration for Spotify status/data.",
      "FriendLastOnline-Plugin": "BetterDiscord plugin to show friend last-online information.",
      "twitch-adblocker-program": "Program for reducing or bypassing Twitch ad interruptions.",
      "bypass-eac": "Research and experiments around Easy Anti-Cheat bypass behavior.",
      "AmongUs-Cheat": "Among Us cheat utility and gameplay modifier scripts.",
      "Netflix-Auto-Skip": "Automatically skips intros/segments while streaming Netflix.",
      "Hollow-Knight-Silksong-Cheat-Table": "Cheat table setup for Hollow Knight / Silksong testing.",
      "simple-Makro-Recorder": "Simple macro recorder for repetitive desktop actions.",
      "Among-Us-Unlock-All": "Unlock helper for Among Us cosmetic/testing features.",
      "dex.lua": "Lua scripting utilities and snippets repository.",
      "Ome.tv-IP-geolocation": "Geolocation lookup helper for Ome.tv IP-based checks.",
      "shutdown": "Small shutdown automation and utility scripts.",
      "Discord-Server-Nuker": "Server-wide destructive action tooling for Discord structures."
    };

    const rootRepoSubtabs = [
      { label: "Chess", url: "https://massivendurchfall.github.io/chess/" },
      { label: "Counter", url: "https://massivendurchfall.github.io/counter/" },
      { label: "PVZ", url: "https://massivendurchfall.github.io/pvz/" },
      { label: "Ryujinx Guide", url: "https://massivendurchfall.github.io/ryjinx/" },
      { label: "Shooter", url: "https://massivendurchfall.github.io/shooter/" },
      { label: "Android", url: "https://massivendurchfall.github.io/andriod/" },
      { label: "Games", url: "https://massivendurchfall.github.io/games/" }
    ];

    function escapeHtml(text) {
      const value = String(text ?? "");
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function createRepoCard(repo, delay) {
      const node = document.createElement("article");
      const description = repo.description || fallbackDescriptions[repo.name] || "No description available.";
      const language = repo.language || "No language";
      const stars = repo.stargazers_count ?? 0;
      const forks = repo.forks_count ?? 0;
      const updated = new Date(repo.pushed_at).toLocaleDateString("en-US");
      const isRootRepo = repo.name === ROOT_REPO;
      const subtabLinks = isRootRepo
        ? rootRepoSubtabs.map((item) => `<a class="btn btn-apk" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.label)}</a>`).join("")
        : "";

      node.className = "card";
      node.style.animationDelay = `${delay}s`;
      node.innerHTML = `
        <div class="top">
          <span class="title">${escapeHtml(repo.name)}</span>
          <span class="chip repo">${escapeHtml(language)}</span>
        </div>
        <p class="info">${escapeHtml(description)}</p>
        <p class="meta">Updated: ${escapeHtml(updated)} | Stars: ${stars} | Forks: ${forks}</p>
        <div class="btn-row">
          <a class="btn btn-muted" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noopener">Open Repo</a>
        </div>
        ${isRootRepo ? `<p class="meta">Subtabs from this repo:</p><div class="btn-row">${subtabLinks}</div>` : ""}
      `;
      return node;
    }

    async function loadRepositories() {
      try {
        const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) {
          throw new Error(`GitHub API error: ${response.status}`);
        }

        const repos = await response.json();
        const visibleRepos = repos
          .filter((repo) => !repo.fork)
          .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

        repoContainer.innerHTML = "";
        repoCount.textContent = `${visibleRepos.length} repositories`;

        if (!visibleRepos.length) {
          repoContainer.innerHTML = `<article class="card"><p class="info">No public repositories found.</p></article>`;
          return;
        }

        visibleRepos.forEach((repo, index) => {
          repoContainer.appendChild(createRepoCard(repo, 0.06 + index * 0.03));
        });
      } catch (error) {
        repoCount.textContent = "Unavailable";
        repoContainer.innerHTML = `
          <article class="card">
            <p class="info">Could not load repositories automatically.</p>
            <div class="btn-row">
              <a class="btn btn-muted" href="https://github.com/${USERNAME}?tab=repositories" target="_blank" rel="noopener">Open GitHub Repositories</a>
            </div>
          </article>
        `;
        console.error(error);
      }
    }

    loadRepositories();
  </script>
</body>
</html>
