
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Massivendurchfall - Game Hub</title>
  <meta name="description" content="Die Hauptseite mit direkten Links zu allen Projekten von Massivendurchfall auf GitHub Pages.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://massivendurchfall.github.io/">
  <meta property="og:title" content="Massivendurchfall - Game Hub">
  <meta property="og:description" content="Schnell zu Chess, Coin, EFT, PVZ, Ryjinx und Shooter springen.">
  <meta name="theme-color" content="#0f1825">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #08101a;
      --bg-b: #10243f;
      --bg-c: #0d3552;
      --card: #f7fbff;
      --ink: #081222;
      --muted: #4f5f73;
      --accent: #ff7a18;
      --accent-soft: #ffd2ad;
      --mint: #0ad4c7;
      --line: rgba(8, 18, 34, 0.14);
      --ring: rgba(255, 122, 24, 0.4);
      --radius: 18px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Sora", sans-serif;
      color: #e9f4ff;
      background:
        radial-gradient(circle at 10% 15%, rgba(255, 122, 24, 0.24), transparent 35%),
        radial-gradient(circle at 86% 8%, rgba(10, 212, 199, 0.24), transparent 30%),
        linear-gradient(120deg, var(--bg-a), var(--bg-b) 55%, var(--bg-c));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.25;
      background:
        repeating-linear-gradient(
          -35deg,
          rgba(255, 255, 255, 0.18) 0 1px,
          transparent 1px 18px
        );
      mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    }

    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(2px);
      pointer-events: none;
      z-index: -1;
      animation: drift 11s ease-in-out infinite;
    }

    .orb-1 {
      width: 180px;
      height: 180px;
      top: -40px;
      left: -35px;
      background: radial-gradient(circle, rgba(255, 122, 24, 0.8), rgba(255, 122, 24, 0.15));
    }

    .orb-2 {
      width: 130px;
      height: 130px;
      right: 8%;
      top: 18%;
      background: radial-gradient(circle, rgba(10, 212, 199, 0.85), rgba(10, 212, 199, 0.18));
      animation-delay: 2s;
    }

    .orb-3 {
      width: 110px;
      height: 110px;
      right: -18px;
      bottom: 16%;
      background: radial-gradient(circle, rgba(255, 210, 173, 0.95), rgba(255, 210, 173, 0.16));
      animation-delay: 4s;
    }

    @keyframes drift {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-16px) translateX(8px);
      }
    }

    .shell {
      width: min(1140px, 92vw);
      margin: 0 auto;
      padding: 34px 0 52px;
    }

    .hero {
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: 30px 24px 24px;
      backdrop-filter: blur(8px);
      animation: reveal 0.55s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    h1 {
      margin-top: 15px;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.5rem, 9vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
      text-wrap: balance;
    }

    .subtitle {
      margin-top: 14px;
      max-width: 760px;
      color: rgba(240, 247, 255, 0.9);
      line-height: 1.65;
      font-size: 0.98rem;
    }

    .hero-row {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .count-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 212, 199, 0.16);
      border: 1px solid rgba(10, 212, 199, 0.34);
      color: #d2fffb;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .ghost-link {
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #f3f8ff;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 700;
      padding: 9px 14px;
      border-radius: 999px;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .ghost-link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.12);
    }

    .projects {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      color: var(--ink);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 10px 24px rgba(8, 18, 34, 0.08);
      transform: translateY(8px);
      opacity: 0;
      animation: reveal 0.45s ease forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(to bottom, var(--accent), var(--mint));
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-left: 2px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .tag {
      border-radius: 999px;
      background: var(--accent-soft);
      color: #6d2c00;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 4px 8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .path {
      color: var(--muted);
      font-size: 0.81rem;
      letter-spacing: 0.01em;
      word-break: break-word;
      margin-left: 2px;
    }

    .btn {
      margin-top: auto;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #0d1320;
      background: linear-gradient(135deg, #ff9a4f, var(--accent));
      border: 1px solid #ff8f3f;
      box-shadow: 0 6px 14px rgba(255, 122, 24, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 122, 24, 0.38);
    }

    .btn:focus-visible,
    .ghost-link:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }

    footer {
      margin-top: 22px;
      text-align: center;
      color: rgba(232, 243, 255, 0.78);
      font-size: 0.82rem;
      animation: reveal 0.9s ease both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding-top: 18px;
      }

      .hero {
        padding: 24px 16px 18px;
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .projects {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <main class="shell">
    <section class="hero">
      <span class="badge">Massivendurchfall Network</span>
      <h1>One Click To Every Project</h1>
      <p class="subtitle">
        Das ist deine neue Hauptseite auf <strong>massivendurchfall.github.io</strong>.
        Von hier springst du direkt zu allen Unterseiten wie <strong>/chess</strong>, <strong>/coin</strong> oder <strong>/ryjinx</strong>.
      </p>
      <div class="hero-row">
        <span class="count-chip"><span id="projectCount">0</span> Seiten live</span>
        <a class="ghost-link" href="https://massivendurchfall.github.io/" aria-label="Hub neu laden">Hub Reload</a>
        <a class="ghost-link" id="randomLink" href="https://massivendurchfall.github.io/chess/" aria-label="Zufaellige Seite aufrufen">Random Jump</a>
      </div>
    </section>

    <section class="projects" id="projects" aria-label="Projekt Links"></section>

    <footer>
      Hauptseite gebaut fuer dein GitHub Pages Setup.
    </footer>
  </main>

  <script>
    const BASE_URL = "https://massivendurchfall.github.io";

    const PROJECTS = [
      { title: "Chess", path: "/chess/", tag: "Strategy" },
      { title: "Coin", path: "/coin/", tag: "Utility" },
      { title: "EFT", path: "/eft/", tag: "Guide" },
      { title: "PVZ", path: "/pvz/", tag: "Game" },
      { title: "Ryjinx", path: "/ryjinx/", tag: "Emu" },
      { title: "Shooter", path: "/shooter/", tag: "Arcade" }
    ];

    const projectGrid = document.getElementById("projects");
    const projectCount = document.getElementById("projectCount");
    const randomLink = document.getElementById("randomLink");

    PROJECTS.forEach((project, index) => {
      const url = BASE_URL + project.path;
      const card = document.createElement("article");
      card.className = "card";
      card.style.animationDelay = (0.1 + index * 0.08).toFixed(2) + "s";
      card.innerHTML = `
        <div class="card-top">
          <h2 class="card-title">${project.title}</h2>
          <span class="tag">${project.tag}</span>
        </div>
        <p class="path">${url}</p>
        <a class="btn" href="${url}" aria-label="${project.title} oeffnen">Open Site</a>
      `;
      projectGrid.appendChild(card);
    });

    projectCount.textContent = String(PROJECTS.length);

    const pickRandom = () => {
      const randomProject = PROJECTS[Math.floor(Math.random() * PROJECTS.length)];
      randomLink.href = BASE_URL + randomProject.path;
      randomLink.textContent = "Random: " + randomProject.title;
    };

    pickRandom();
    randomLink.addEventListener("click", pickRandom);
  </script>
</body>
</html>
