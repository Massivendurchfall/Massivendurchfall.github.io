<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects | Massivendurchfall</title>
  <meta name="description" content="Project hub with Android APKs and web tools.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Projects | Massivendurchfall">
  <meta property="og:description" content="Android APKs and web projects in one clean hub.">
  <meta property="og:url" content="https://massivendurchfall.github.io/">
  <meta name="theme-color" content="#081a2e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #061323;
      --bg-b: #0b2740;
      --bg-c: #143d5d;
      --panel: rgba(8, 27, 43, 0.8);
      --panel-soft: rgba(9, 34, 56, 0.72);
      --line: rgba(219, 237, 255, 0.16);
      --text: #e9f4ff;
      --muted: #b0c9de;
      --accent-1: #73f0a3;
      --accent-2: #58ccff;
      --accent-3: #ff9f4a;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(52rem 36rem at -10% -12%, rgba(255, 159, 74, 0.26), transparent 56%),
        radial-gradient(45rem 30rem at 105% 10%, rgba(88, 204, 255, 0.22), transparent 62%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b) 54%, var(--bg-c));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.32;
      background-image: linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(circle at center, black 46%, transparent 100%);
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      z-index: -1;
      filter: blur(12px);
      pointer-events: none;
      animation: sway 11s ease-in-out infinite;
    }

    .orb.one {
      width: 170px;
      height: 170px;
      left: -40px;
      top: 22%;
      background: rgba(115, 240, 163, 0.45);
    }

    .orb.two {
      width: 140px;
      height: 140px;
      right: 4%;
      top: 14%;
      background: rgba(88, 204, 255, 0.44);
      animation-delay: 2s;
    }

    @keyframes sway {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-14px) translateX(8px); }
    }

    .layout {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 32px 0 58px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(7px);
      box-shadow: var(--shadow);
      padding: 26px 20px;
      animation: rise 0.52s ease both;
    }

    h1 {
      font-family: "Zen Dots", cursive;
      font-size: clamp(2rem, 8.4vw, 4.2rem);
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .hero-note {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 700px;
      font-size: 0.97rem;
    }

    .section {
      margin-top: 28px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      font-family: "Zen Dots", cursive;
      font-size: clamp(1.2rem, 5.5vw, 1.9rem);
      letter-spacing: 0.03em;
    }

    .section-head p {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
      transform: translateY(8px);
      opacity: 0;
      animation: rise 0.46s ease forwards;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(219, 237, 255, 0.42);
      background: rgba(12, 39, 63, 0.9);
      outline: none;
    }

    .card-info {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .card-text {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .tag {
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .tag.apk {
      background: linear-gradient(135deg, var(--accent-1), #a9ffd0);
      border-color: rgba(115, 240, 163, 0.65);
      color: #022010;
    }

    .tag.web {
      background: linear-gradient(135deg, var(--accent-2), #9de7ff);
      border-color: rgba(88, 204, 255, 0.65);
      color: #031a25;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      animation: rise 1s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(11px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .layout {
        padding-top: 20px;
      }

      .hero {
        padding: 20px 14px;
      }

      .hero-note {
        font-size: 0.92rem;
      }

      .card {
        padding: 12px;
      }

      .card-title {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main class="layout">
    <section class="hero">
      <h1>My Projects</h1>
    </section>

    <section class="section" aria-labelledby="apps-title">
      <div class="section-head">
        <h2 id="apps-title">Phone Apps</h2>
        <p>Android APKs only</p>
      </div>
      <div class="stack" id="appLinks"></div>
    </section>

    <section class="section" aria-labelledby="web-title">
      <div class="section-head">
        <h2 id="web-title">Web Projects</h2>
        <p>6 live pages</p>
      </div>
      <div class="stack" id="webLinks"></div>
    </section>

    <footer>massivendurchfall.github.io</footer>
  </main>

  <script>
    const BASE = "https://massivendurchfall.github.io";

    const appProjects = [
      {
        title: "GhostChat APK",
        note: "Anonymous chat app.",
        path: "/andriod/ghostchat.apk",
        tag: "APK"
      },
      {
        title: "S.to APK",
        note: "App for s.to, ad-free and lightweight.",
        path: "/andriod/s.to.apk",
        tag: "APK"
      }
    ];

    const webProjects = [
      { title: "Chess", note: "Calculates the best moves with Stockfish.", path: "/chess/", tag: "Web" },
      { title: "Coin", note: "Simple coin flipper.", path: "/coin/", tag: "Web" },
      { title: "Counter", note: "Easy number counter.", path: "/counter/", tag: "Web" },
      { title: "PVZ", note: "Plants vs Zombies Replanted download page.", path: "/pvz/", tag: "Web" },
      { title: "Ryujinx", note: "Tutorial page for emulator installation.", path: "/ryjinx/", tag: "Web" },
      { title: "Shooter", note: "Small freestyle shooter.", path: "/shooter/", tag: "Web" }
    ];

    const appContainer = document.getElementById("appLinks");
    const webContainer = document.getElementById("webLinks");

    function createCard(item, type, delay) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = BASE + item.path;
      card.style.animationDelay = `${delay}s`;
      card.innerHTML = `
        <div class="card-info">
          <span class="card-title">${item.title}</span>
          <span class="card-text">${item.note}<br>${BASE + item.path}</span>
        </div>
        <span class="tag ${type}">${item.tag}</span>
      `;
      return card;
    }

    appProjects.forEach((item, index) => {
      appContainer.appendChild(createCard(item, "apk", 0.08 + index * 0.06));
    });

    webProjects.forEach((item, index) => {
      webContainer.appendChild(createCard(item, "web", 0.15 + index * 0.05));
    });
  </script>
</body>
</html>
