<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexikon — Ein Vokabel Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4ebd9;
    --cream-2: #ede1c6;
    --paper: #fbf5e7;
    --ink: #2a1e10;
    --ink-soft: #5a4a30;
    --muted: #8a7a5c;
    --muted-soft: #a89876;
    --rule: #d8c9a3;
    --rule-soft: #e5dcc1;
    --bordeaux: #7a1c1c;
    --bordeaux-soft: #a83838;
    --forest: #1c3d2e;
    --forest-soft: #2a5341;
    --ember: #c2410c;
    --gold: #c9a64e;
    --gold-bright: #e6c879;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 1px 1px, rgba(122,28,28,0.06) 1px, transparent 0) 0 0 / 22px 22px,
      linear-gradient(135deg, var(--cream) 0%, var(--cream-2) 100%);
    background-attachment: fixed;
    padding: 28px 22px 70px;
    line-height: 1.55;
    font-size: 17px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    padding-bottom: 20px; margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon { width: 32px; height: 32px; color: var(--bordeaux); flex-shrink: 0; }
  .brand-title {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 700; letter-spacing: 0; line-height: 1;
  }
  .brand-sub {
    font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-top: 5px;
  }
  .stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 13px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-size: 15px; font-weight: 600;
  }
  .chip svg { width: 16px; height: 16px; }
  .chip-flame { color: var(--ember); }
  .chip-gold { color: var(--gold); }
  .chip-link {
    cursor: pointer; transition: background 0.15s, transform 0.15s, border-color 0.15s;
  }
  .chip-link:hover { background: var(--cream); border-color: var(--ink-soft); transform: translateY(-1px); }

  .progress-strip {
    max-width: 900px; margin: 0 auto 22px;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 4px; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .strip-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 16px; color: var(--ink-soft);
  }
  .strip-label strong { font-style: normal; color: var(--bordeaux); font-weight: 600; }
  .strip-track {
    flex: 1; min-width: 140px; height: 8px;
    background: var(--rule-soft); border-radius: 99px; overflow: hidden;
    position: relative;
  }
  .strip-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bordeaux) 0%, var(--bordeaux-soft) 100%);
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .strip-count {
    font-size: 14px; color: var(--muted);
    letter-spacing: 0.06em;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  main { position: relative; }

  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 44px 40px;
    box-shadow:
      0 1px 0 var(--rule),
      0 8px 24px -12px rgba(42,30,16,0.15),
      0 24px 60px -24px rgba(42,30,16,0.2);
    position: relative;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.shake { animation: shake 0.45s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 30px; flex-wrap: wrap; gap: 14px;
  }
  .dir-row { display: flex; align-items: center; gap: 8px; }
  .flag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 7px 11px; border-radius: 4px; color: var(--cream);
  }
  .flag-en { background: var(--forest); }
  .flag-de { background: var(--bordeaux); }
  .arrow { color: var(--muted); }
  .mode-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 16px; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
  }
  .strength-stars {
    display: inline-flex; gap: 2px;
    margin-left: 6px;
  }
  .star {
    width: 13px; height: 13px;
    color: var(--rule);
  }
  .star.on { color: var(--gold); }

  .prompt-word {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    font-family: 'Fraunces', serif;
    font-size: 58px;
    font-weight: 600; letter-spacing: 0; line-height: 1.08;
    margin-bottom: 10px; text-align: center;
    flex-wrap: wrap;
  }
  .speak-btn {
    background: transparent; border: 1px solid var(--rule); border-radius: 999px;
    width: 48px; height: 48px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--bordeaux); cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, transform 0.15s;
  }
  .speak-btn:hover { background: var(--cream); transform: scale(1.06); }
  .speak-btn:active { transform: scale(0.96); }
  .speak-btn svg { width: 22px; height: 22px; }
  .pos {
    text-align: center; font-style: italic;
    font-family: 'Fraunces', serif; color: var(--muted);
    font-size: 17px; margin-bottom: 30px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
  }
  .choice-btn {
    min-height: 76px;
    padding: 22px 18px;
    border: 2px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    font-size: 20px; font-weight: 500; line-height: 1.25;
    cursor: pointer; font-family: inherit;
    overflow-wrap: anywhere;
    position: relative;
    transition: transform 0.12s, border-color 0.15s, background 0.15s;
  }
  .choice-btn::before {
    content: attr(data-key);
    position: absolute; top: 8px; left: 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--muted);
    background: var(--cream);
    padding: 2px 6px; border-radius: 3px;
    border: 1px solid var(--rule-soft);
    opacity: 0.7;
  }
  .choice-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--ink-soft); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: #e8f0e4; border-color: var(--forest); color: var(--forest); }
  .choice-btn.wrong { background: #f5dede; border-color: var(--bordeaux); color: var(--bordeaux); }
  .choice-btn.dim { opacity: 0.42; }

  .input {
    width: 100%; padding: 20px 20px;
    font-size: 22px;
    border: 2px solid var(--rule);
    border-radius: 4px;
    font-family: 'Fraunces', serif;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .input:focus { border-color: var(--ink-soft); }
  .input.right { border-color: var(--forest); background: #e8f0e4; }
  .input.wrong { border-color: var(--bordeaux); background: #f5dede; }
  .correct-reveal {
    margin-top: 14px; font-family: 'Fraunces', serif; font-style: italic;
    color: var(--bordeaux); font-size: 17px;
  }

  .cloze-source {
    background: var(--cream);
    border-left: 4px solid var(--forest);
    padding: 22px 24px;
    border-radius: 2px;
    margin-bottom: 24px;
  }
  .cloze-source-intro {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--muted); font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .cloze-source-text {
    font-family: 'Fraunces', serif;
    font-size: 22px; line-height: 1.45;
    color: var(--ink);
  }
  .cloze-intro {
    text-align: center;
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--muted); font-size: 15px;
    margin-bottom: 12px;
  }
  .cloze-blank {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    text-align: center; line-height: 1.5;
    margin-bottom: 26px;
    padding: 20px 22px;
    background: var(--paper);
    border: 1px dashed var(--rule);
    border-radius: 4px;
    color: var(--ink);
  }
  .cloze-blank-slot {
    display: inline-block;
    background: var(--cream);
    padding: 2px 14px;
    border-bottom: 2px solid var(--bordeaux);
    margin: 0 4px;
    min-width: 60px;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 24px;
    border-radius: 4px; cursor: pointer; font-family: inherit;
    font-size: 17px; font-weight: 600; letter-spacing: 0.03em;
    border: none; transition: transform 0.12s, opacity 0.12s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--bordeaux); color: var(--cream); width: 100%; }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--rule);
  }

  .result {
    margin-top: 24px; padding: 22px; border-radius: 4px;
    color: var(--cream);
    animation: fadeUp 0.28s ease;
  }
  .result.right { background: var(--forest); }
  .result.wrong { background: var(--bordeaux); }
  .result-text {
    font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600;
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .result-reveal {
    font-size: 15px; line-height: 1.5; margin-bottom: 14px;
    opacity: 0.92;
  }
  .result-reveal .strong { font-weight: 600; font-style: italic; }
  .continue {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px;
    background: var(--cream); color: var(--ink);
    border: none; border-radius: 4px;
    font-size: 15px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    cursor: pointer; font-family: inherit; width: 100%;
  }
  .star-up {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(244,235,217,0.18);
    padding: 4px 9px; border-radius: 99px;
    font-size: 12px; font-weight: 600; margin-left: 8px;
    animation: starPop 0.5s ease;
  }
  .star-up svg { width: 12px; height: 12px; color: var(--gold-bright); }
  @keyframes starPop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .skip-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    margin: 18px auto 0; padding: 8px 14px;
    background: transparent; color: var(--muted);
    border: none; border-bottom: 1px dashed var(--rule);
    cursor: pointer; font-family: inherit;
    font-size: 14px; letter-spacing: 0.04em;
    transition: color 0.15s, border-color 0.15s;
  }
  .skip-btn:hover { color: var(--bordeaux); border-bottom-color: var(--bordeaux); }
  .skip-row { display: flex; justify-content: center; margin-top: 14px; }

  .secondary-actions {
    max-width: 900px; margin: 22px auto 0;
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .secondary-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-family: inherit; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .secondary-btn:hover { color: var(--bordeaux); border-color: var(--bordeaux); background: var(--paper); }
  .secondary-btn svg { width: 14px; height: 14px; }

  footer.bottom {
    max-width: 900px; margin: 42px auto 0;
    padding-top: 16px; border-top: 1px solid var(--rule-soft);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted);
  }
  footer kbd {
    background: var(--paper); border: 1px solid var(--rule);
    padding: 2px 6px; border-radius: 3px;
    font-family: 'DM Sans', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--ink-soft);
  }

  /* Loading */
  .loading {
    max-width: 620px; margin: 12vh auto 0; text-align: center; padding: 0 20px;
  }
  .loading-icon { color: var(--bordeaux); animation: spin 2s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .loading-title {
    font-family: 'Fraunces', serif; font-size: 42px; font-weight: 600;
    letter-spacing: 0; margin: 28px 0 8px;
  }
  .loading-sub {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--muted); margin-bottom: 32px; font-size: 19px;
  }
  .loading-detail {
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-top: 14px; min-height: 16px;
  }
  .progress-track {
    height: 8px; background: var(--rule-soft); border-radius: 99px;
    overflow: hidden; margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%; background: var(--bordeaux);
    transition: width 0.3s ease;
  }
  .loading-count {
    font-size: 14px; color: var(--muted);
    letter-spacing: 0.06em;
  }

  .error-box {
    max-width: 620px; margin: 10vh auto 0; padding: 40px;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 4px;
    text-align: center;
  }
  .error-title {
    font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600;
    margin-bottom: 12px;
  }
  .error-msg { color: var(--ink-soft); margin-bottom: 28px; font-size: 16px; }

  .stage-banner {
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-soft) 100%);
    color: var(--cream);
    padding: 38px 36px; border-radius: 4px;
    text-align: center; margin-bottom: 20px;
    animation: fadeUp 0.4s ease;
  }
  .stage-banner.gold {
    background: linear-gradient(135deg, var(--bordeaux) 0%, #9a3838 100%);
  }
  .stage-banner h2 {
    font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600;
    margin: 0 0 12px; letter-spacing: 0;
  }
  .stage-banner p { margin: 0; opacity: 0.88; font-size: 17px; line-height: 1.55; }
  .stage-banner .stage-btn {
    margin-top: 22px;
    background: var(--cream); color: var(--ink);
    border: none; padding: 14px 26px; border-radius: 4px;
    font-family: inherit; font-weight: 700; font-size: 14px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: transform 0.12s;
  }
  .stage-banner .stage-btn:hover { transform: translateY(-1px); }
  .stage-stats {
    display: flex; justify-content: center; gap: 32px;
    margin-top: 22px; flex-wrap: wrap;
  }
  .stage-stat { text-align: center; }
  .stage-stat-num {
    font-family: 'Fraunces', serif; font-size: 38px; font-weight: 700;
    line-height: 1; color: var(--gold-bright);
  }
  .stage-stat-label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cream); opacity: 0.7;
    margin-top: 6px;
  }

  /* Vocab overview */
  .overview {
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 4px; padding: 30px 32px;
    animation: fadeUp 0.35s ease;
  }
  .overview-head {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px; border-bottom: 1px solid var(--rule-soft);
  }
  .overview-title {
    font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600;
    letter-spacing: 0;
  }
  .overview-table {
    width: 100%; border-collapse: collapse;
  }
  .overview-table tr {
    border-bottom: 1px solid var(--rule-soft);
    transition: background 0.15s;
  }
  .overview-table tr:hover { background: var(--cream); }
  .overview-table tr:last-child { border-bottom: none; }
  .overview-table td {
    padding: 14px 8px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
  }
  .ov-en { font-weight: 600; }
  .ov-de { color: var(--ink-soft); }
  .ov-pos { font-size: 13px; color: var(--muted); font-style: italic; }
  .ov-stars { display: inline-flex; gap: 3px; }
  .ov-stars svg { width: 14px; height: 14px; color: var(--rule); }
  .ov-stars svg.on { color: var(--gold); }
  .ov-speak {
    background: transparent; border: none; cursor: pointer;
    color: var(--bordeaux); padding: 4px; border-radius: 4px;
    transition: background 0.15s;
  }
  .ov-speak:hover { background: var(--cream); }
  .ov-speak svg { width: 18px; height: 18px; vertical-align: middle; }

  .hidden { display: none !important; }

  @media (max-width: 640px) {
    body { padding: 14px 12px 48px; font-size: 16px; }
    header.top { gap: 12px; margin-bottom: 16px; padding-bottom: 14px; }
    .brand { gap: 10px; }
    .brand-icon { width: 28px; height: 28px; }
    .brand-title { font-size: 28px; }
    .brand-sub { font-size: 11px; letter-spacing: 0.1em; }
    .stats { width: 100%; gap: 6px; }
    .chip { flex: 1; min-width: 0; justify-content: center; padding: 8px 8px; font-size: 13px; }
    .progress-strip { padding: 12px 14px; gap: 8px; margin-bottom: 14px; }
    .strip-label { width: 100%; font-size: 15px; }
    .strip-track { flex-basis: 100%; min-width: 100%; order: 3; }
    .strip-count { margin-left: auto; font-size: 13px; }
    .card { padding: 22px 14px; }
    .card-head { margin-bottom: 22px; gap: 10px; }
    .dir-row { width: 100%; justify-content: center; }
    .mode-label { width: 100%; justify-content: center; font-size: 15px; flex-wrap: wrap; }
    .prompt-word { font-size: 38px; gap: 10px; }
    .speak-btn { width: 44px; height: 44px; }
    .pos { font-size: 15px; margin-bottom: 22px; }
    .choice-grid { grid-template-columns: 1fr; gap: 10px; }
    .choice-btn { min-height: 64px; padding: 18px 16px 18px 18px; font-size: 18px; }
    .choice-btn::before { font-size: 10px; top: 6px; left: 8px; }
    .input { font-size: 19px; padding: 16px; }
    .cloze-source { padding: 16px 18px; margin-bottom: 18px; }
    .cloze-source-text { font-size: 19px; }
    .cloze-blank { font-size: 19px; padding: 14px 16px; margin-bottom: 18px; }
    .btn { font-size: 16px; padding: 15px 18px; }
    .continue { font-size: 14px; }
    .secondary-actions { gap: 6px; margin-top: 16px; }
    .secondary-btn { padding: 8px 12px; font-size: 11px; letter-spacing: 0.06em; }
    .overview { padding: 20px 16px; }
    .overview-title { font-size: 22px; }
    .overview-table td { padding: 11px 5px; font-size: 15px; }
    .ov-pos { display: none; }
    footer.bottom { margin-top: 26px; flex-direction: column; text-align: center; font-size: 11px; }
    .loading { margin-top: 8vh; }
    .loading-title { font-size: 32px; }
    .loading-sub { font-size: 17px; }
    .stage-banner { padding: 28px 20px; }
    .stage-banner h2 { font-size: 24px; }
    .stage-banner p { font-size: 16px; }
    .stage-stats { gap: 18px; margin-top: 18px; }
    .stage-stat-num { font-size: 30px; }
  }
</style>
</head>
<body>

<div id="loading-view" class="loading">
  <div class="loading-icon">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
  </div>
  <h1 class="loading-title">Lexikon wird geöffnet</h1>

function fetchWithTimeout(url, ms = 7000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal })
    .finally(() => clearTimeout(t));
}

async function loadFrequencyList() {
  if (cachedFreqList) return cachedFreqList;
  for (const url of FREQUENCY_LISTS) {
    try {
      const r = await fetchWithTimeout(url, 9000);
      if (!r.ok) continue;
      const txt = await r.text();
      const lines = txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      const filtered = lines
        .slice(0, 3000)
        .filter(w => /^[a-z]{4,9}$/.test(w))
        .filter(w => !STOP_WORDS.has(w));
      if (filtered.length > 100) {
        cachedFreqList = filtered;
        return filtered;
      }
    } catch (e) {}
  }
  return null;
}

async function fetchSeedWords(n) {
  const corpusWords = shuffle([...SENTENCE_BY_WORD.keys()]);
  const list = await loadFrequencyList();
  const fromCorpus = corpusWords.slice(0, Math.ceil(n * 0.65));
  const corpusSet = new Set(fromCorpus);
  const extra = list
    ? shuffle([...list]).filter(w => !corpusSet.has(w)).slice(0, n)
    : [];
  // Wenn Frequency-Liste fehlschlägt, hat fromCorpus genug
  return shuffle([...fromCorpus, ...extra]);
}

async function fetchDictionary(word) {
  try {
    const r = await fetchWithTimeout(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`, 6000);
    if (!r.ok) return null;
    const data = await r.json();
    if (!Array.isArray(data) || !data[0]) return null;
    const entry = data[0];
    let pos = null;
    for (const m of (entry.meanings || [])) {
      if (!pos) pos = m.partOfSpeech;
      if (pos) break;
    }
    return { pos };
  } catch (e) { return null; }
}

  if (translateBlocked) return null;
  try {
    const pair = direction === 'en-de' ? 'en|de' : 'de|en';
    const r = await fetchWithTimeout(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`, 6000);
    if (!r.ok) {
      if (r.status === 429 || r.status === 403) translateBlocked = true;
      return null;
    }
    const data = await r.json();
    const primary = data?.responseData?.translatedText?.trim();
    if (!primary) return null;
    const pl = primary.toLowerCase();
    if (pl.includes('quota exceeded') || pl.includes('mymemory warning')) {
      translateBlocked = true;
      return null;
    }
    if (pl.includes('invalid') || pl.includes('please select')) return null;
    const all = new Set([primary]);
    if (Array.isArray(data.matches)) {
      for (const m of data.matches) {
        const t = (m.translation || '').trim();
        if (!t) continue;
        const tl = t.toLowerCase();
        if (tl.includes('mymemory warning') || tl.includes('invalid')) continue;
        if (t.split(/\s+/).length > 3) continue;
        const q = typeof m.quality === 'string' ? parseInt(m.quality) : m.quality;
        if (q != null && q < 60) continue;
        all.add(t);
      }
    }
    return { primary, all: [...all] };
  } catch (e) { return null; }
}

// ───────────────────────────────────────────────────────────────
// POOL BUILDING (parallel batches)
// ───────────────────────────────────────────────────────────────
async function processWord(w) {
  const knownLemma = CORPUS_LEMMA[w];

  if (translateBlocked && knownLemma) {
    const dict = await fetchDictionary(w).catch(() => null);
    return makePoolEntry(w, knownLemma[0], [...knownLemma], [w], dict);
  }

  const [dict, deResult] = await Promise.all([
    fetchDictionary(w).catch(() => null),
    translate(w, 'en-de').catch(() => null),
  ]);

  if (!deResult) {
    if (knownLemma) return makePoolEntry(w, knownLemma[0], [...knownLemma], [w], dict);
    return null;
  }

  const dePrimary = deResult.primary;
  if (dePrimary.toLowerCase() === w) return null;
  if (dePrimary.split(/\s+/).length > 2) return null;
  if (!/^[a-zäöüßA-ZÄÖÜ\-]+$/.test(dePrimary)) return null;

  const backResult = await translate(dePrimary, 'de-en').catch(() => null);
  if (!backResult) {
    if (knownLemma) return makePoolEntry(w, knownLemma[0], [...knownLemma], [w], dict);
    return null;
  }

  const backAllLower = backResult.all.map(s => s.toLowerCase());
  if (!backAllLower.includes(w) && !knownLemma) return null;

  let deAll = deResult.all
    .filter(t => /^[a-zäöüßA-ZÄÖÜ\-]+$/.test(t))
    .filter(t => t.toLowerCase() !== w);
  const enAll = backResult.all
    .filter(t => /^[a-zA-Z\-]+$/.test(t))
    .map(t => t.toLowerCase());

  let finalDe = dePrimary;
  if (knownLemma) {
    for (const l of knownLemma) if (!deAll.includes(l)) deAll.unshift(l);
    finalDe = knownLemma[0];
  }

  return makePoolEntry(w, finalDe, [finalDe, ...deAll], enAll.length ? enAll : [w], dict);
}

function makePoolEntry(w, dePrimary, deAll, enAll, dict) {
  if (!enAll.includes(w)) enAll.unshift(w);
  const posKey = getPosKey(dict?.pos);
  return {
    en: w,
    de: dePrimary,
    deAll: [...new Set(deAll)],
    enAll: [...new Set(enAll)],
    pos: dict?.pos || null,
    posKey,
    examples: SENTENCE_BY_WORD.get(w) || [],
    strength: 0,
    seen: 0,
  };
}

function getPosKey(pos) {
  const p = (pos || '').toLowerCase();
  if (p.includes('noun')) return 'noun';
  if (p.includes('verb')) return 'verb';
  if (p.includes('adjective')) return 'adjective';
  if (p.includes('adverb')) return 'adverb';
  return 'default';
}

async function buildPool(size) {
  document.getElementById('progress-total').textContent = size;
  setDetail('Hole englische Wörter…');
  const wordsRaw = await fetchSeedWords(Math.ceil(size * 3.5));
  const candidates = [];
  const seen = new Set();
  for (const raw of wordsRaw) {
    const w = (raw || '').toLowerCase().trim();
    if (!/^[a-z]{4,9}$/.test(w)) continue;
    if (seen.has(w)) continue;
    if (STOP_WORDS.has(w)) continue;
    seen.add(w);
    candidates.push(w);
  }

  setDetail('Schlage parallel nach…');
  const newPool = [];
  const BATCH_SIZE = 6;
  let totalFails = 0;
  let i = 0;
  const maxProcess = Math.min(candidates.length, size * 4);

  while (newPool.length < size && i < maxProcess) {
    if (totalFails >= 20) {
      setDetail('Falle auf Korpus-Wörter zurück…');
      // Backfill: garantiere Mindestgröße aus Korpus
      const corpus = [...SENTENCE_BY_WORD.keys()].filter(w => !newPool.some(p => p.en === w));
      for (const w of shuffle(corpus)) {
        if (newPool.length >= size) break;
        const lemma = CORPUS_LEMMA[w];
        if (!lemma) continue;
        newPool.push(makePoolEntry(w, lemma[0], [...lemma], [w], null));
        document.getElementById('progress-done').textContent = newPool.length;
        document.getElementById('progress-fill').style.width = ((newPool.length / size) * 100) + '%';
      }
      break;
    }
    const batch = candidates.slice(i, i + BATCH_SIZE);
    i += BATCH_SIZE;
    setDetail(`Prüfe ${batch.length} Wörter parallel… (${newPool.length}/${size})`);

    const results = await Promise.all(batch.map(w => processWord(w).catch(() => null)));

    for (const r of results) {
      if (newPool.length >= size) break;
      if (r) {
        newPool.push(r);
      } else {
        totalFails++;
      }
    }
    document.getElementById('progress-done').textContent = newPool.length;
    document.getElementById('progress-fill').style.width = ((newPool.length / size) * 100) + '%';
  }
  setDetail('');
  return newPool;
}

function setDetail(s) {
  const el = document.getElementById('loading-detail');
  if (el) el.textContent = s;
}

// ───────────────────────────────────────────────────────────────
// HELPERS
// ───────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/[.,!?;:"'„"]/g, '').replace(/\s+/g, ' ');
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[m][n];
}

function checkTyping(user, acceptedList) {
  const u = normalize(user);
  for (const correct of acceptedList) {
    const c = normalize(correct);
    if (u === c) return true;
    const tolerance = c.length <= 5 ? 1 : c.length <= 10 ? 2 : 3;
    if (levenshtein(u, c) <= tolerance) return true;
  }
  return false;
}

function buildBlankSentence(sentence, acceptedWords) {
  const sorted = [...acceptedWords].sort((a, b) => b.length - a.length);
  for (const word of sorted) {
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b${escaped}\\b`, 'i');
    if (re.test(sentence)) {
      return sentence.replace(re, '<<<BLANK>>>');
    }
  }
  return null;
}

function pickDistractors(correct, key, allAccepted, n, samePos = null) {
  const acceptedLower = new Set(allAccepted.map(s => s.toLowerCase()));
  let candidates = pool.filter(p => !acceptedLower.has(p[key].toLowerCase()));
  if (samePos) {
    const sameP = candidates.filter(p => p.posKey === samePos);
    if (sameP.length >= n) candidates = sameP;
  }
  return shuffle(candidates).slice(0, n).map(p => p[key]);
}

// ───────────────────────────────────────────────────────────────
// TTS — robust
// ───────────────────────────────────────────────────────────────
let voicesReady = false;
let voiceCache = { en: null, de: null };

function refreshVoices() {
  if (!window.speechSynthesis) return [];
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return [];
  voicesReady = true;
  voiceCache.en =
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => /^en[-_]US/i.test(v.lang)) ||
    voices.find(v => v.lang.toLowerCase().startsWith('en')) || null;
  voiceCache.de =
    voices.find(v => v.lang === 'de-DE') ||
    voices.find(v => /^de[-_]DE/i.test(v.lang)) ||
    voices.find(v => v.lang.toLowerCase().startsWith('de')) || null;
  return voices;
}

function speak(text, lang) {
  try {
    if (!window.speechSynthesis || !text) return;
    if (!voicesReady) refreshVoices();
    const voice = voiceCache.de || voiceCache.en;
    if (!voice) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = voice;
    u.lang = voice.lang;
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

// ───────────────────────────────────────────────────────────────
// DOM HELPERS
// ───────────────────────────────────────────────────────────────
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'style') node.setAttribute('style', v);
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function starsEl(strength) {

function modeLabel(m) {
  return {
    choice: 'Wähle die Übersetzung',
    type: 'Tippe die Übersetzung',
    cloze: 'Welches Wort passt in die Lücke?',
  }[m];
}

// ───────────────────────────────────────────────────────────────
// QUEUE / SCHEDULING (Spaced Repetition)
// ───────────────────────────────────────────────────────────────
function buildRoundQueue() {
  // In dieser Runde: jedes Wort, dessen Stärke < MASTERY_THRESHOLD,
  // wird in zufälliger Richtung + Modus gezeigt
  // Modus-Verteilung nach Stärke:
  //   0-1: choice (einfach)
  //   2:   choice oder cloze
  //   3-4: type oder cloze
  const items = [];
  for (const w of pool) {
    if (w.strength >= MASTERY_THRESHOLD) continue;
    const dir = Math.random() < 0.5 ? 'en-de' : 'de-en';
    let mode;
    if (w.strength <= 1) {
      mode = 'choice';
    } else if (w.strength === 2) {
      mode = Math.random() < 0.5 ? 'choice' : (w.examples.length ? 'cloze' : 'choice');
    } else {
      const hasCloze = w.examples.length > 0;
      const candidates = ['type'];
      if (hasCloze) candidates.push('cloze');
      mode = candidates[Math.floor(Math.random() * candidates.length)];
    }
    items.push({ word: w, dir, mode });
  }
  return shuffle(items);
}

function generateQuestion(item) {
  const w = item.word;
  const dir = item.dir;
  const mode = item.mode;
  const promptKey = dir === 'en-de' ? 'en' : 'de';
  const answerKey = dir === 'en-de' ? 'de' : 'en';
  const accepted = dir === 'en-de' ? w.deAll : w.enAll;
  const primary = w[answerKey];

  if (mode === 'cloze') {
    const sourceLang = dir === 'en-de' ? 'en' : 'de';
    const targetLang = dir === 'en-de' ? 'de' : 'en';
    // Erst gültigen Beispielsatz finden — einen wo das accepted-Word vorkommt
    let chosenEx = null;
    let blankSrc = null;
    for (const ex of shuffle([...w.examples])) {
      const targetSentence = targetLang === 'en' ? ex.en : ex.de;
      const acc = targetLang === 'en' ? w.enAll : w.deAll;
      const r = buildBlankSentence(targetSentence, acc);
      if (r) {
        chosenEx = ex;
        blankSrc = { full: targetSentence, blank: r };
        break;
      }
    }
    // Fallback auf choice falls kein passender Satz
    if (!chosenEx) {
      return generateQuestion({ word: w, dir, mode: 'choice' });
    }
    const distractors = pickDistractors(primary, answerKey, accepted, 3, w.posKey);
    const options = shuffle([primary, ...distractors]);
    return {
      mode: 'cloze',
      dir, sourceLang, targetLang,
      sourceSentence: sourceLang === 'en' ? chosenEx.en : chosenEx.de,
      blankSentence: blankSrc.blank,
      fullSentence: blankSrc.full,
      correct: primary,
      accepted,
      options,
      raw: w,
    };
  }

  if (mode === 'choice') {
    const distractors = pickDistractors(primary, answerKey, accepted, 3);
    return { mode, dir, prompt: w[promptKey], correct: primary, accepted, options: shuffle([primary, ...distractors]), raw: w };
  }
  // type
  return { mode: 'type', dir, prompt: w[promptKey], correct: primary, accepted, raw: w };
}

// ───────────────────────────────────────────────────────────────
// RENDERING
// ───────────────────────────────────────────────────────────────
let answered = false;
let isCorrect = false;

function renderCurrent() {
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  answered = false; isCorrect = false;
  if (!currentQ) return;
  const q = currentQ;

  const card = el('div', { class: 'card', id: 'card' });

  const head = el('div', { class: 'card-head' });
  const fromLang = q.dir === 'en-de' ? 'en' : 'de';
  const toLang = q.dir === 'en-de' ? 'de' : 'en';
  const dirRow = el('div', { class: 'dir-row' });
  dirRow.appendChild(flagEl(fromLang));
  const arrow = el('span', { html: SVG_ARROW });
  dirRow.appendChild(arrow.firstChild);
  dirRow.appendChild(flagEl(toLang));
  head.appendChild(dirRow);

  const modeArea = el('div', { class: 'mode-label' });
  const modeText = el('span'); modeText.textContent = modeLabel(q.mode);
  modeArea.appendChild(modeText);
  modeArea.appendChild(buildStarsInline(q.raw.strength));
  head.appendChild(modeArea);
  card.appendChild(head);

  if (q.mode === 'choice' || q.mode === 'type') {
    const promptWord = el('div', { class: 'prompt-word' });
    const span = el('span'); span.textContent = q.prompt;
    promptWord.appendChild(span);
    promptWord.appendChild(speakerButton(q.prompt, fromLang));
    card.appendChild(promptWord);
    if (q.raw.pos) {
      const pos = el('div', { class: 'pos' }); pos.textContent = q.raw.pos;
      card.appendChild(pos);
    } else {
      card.appendChild(el('div', { style: 'height:18px' }));
    }

    if (q.mode === 'choice') {
      const grid = el('div', { class: 'choice-grid' });
      q.options.forEach((opt, i) => {
        const btn = el('button', { class: 'choice-btn', 'data-key': String(i + 1) });
        btn.textContent = opt;
        btn.addEventListener('click', () => onChoice(i, opt));
        grid.appendChild(btn);
      });
      card.appendChild(grid);
    } else {
      const input = el('input', {
        class: 'input', id: 'type-input',
        placeholder: `Übersetzung auf ${toLang === 'de' ? 'Deutsch' : 'Englisch'} …`,
        autocomplete: 'off', autocapitalize: 'off', spellcheck: 'false',
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          if (answered) advance();
          else onTypeCheck();
        }
      });
      card.appendChild(input);
      card.appendChild(el('div', { id: 'reveal-slot' }));
      const checkBtn = el('button', { class: 'btn btn-primary', style: 'margin-top:16px', id: 'check-btn' });
      checkBtn.textContent = 'Prüfen';
      checkBtn.addEventListener('click', onTypeCheck);
      card.appendChild(checkBtn);
      setTimeout(() => input.focus(), 60);
    }
  } else if (q.mode === 'cloze') {
    const sourceBlock = el('div', { class: 'cloze-source' });
    const sIntro = el('div', { class: 'cloze-source-intro' });
    sIntro.textContent = q.sourceLang === 'en' ? 'Englischer Satz' : 'Deutscher Satz';
    sourceBlock.appendChild(sIntro);
    const sText = el('div', { class: 'cloze-source-text' });
    sText.textContent = q.sourceSentence;
    sourceBlock.appendChild(sText);
    const speakRow = el('div', { style: 'display:flex; justify-content:center; margin-top:12px;' });
    speakRow.appendChild(speakerButton(q.sourceSentence, q.sourceLang));
    sourceBlock.appendChild(speakRow);
    card.appendChild(sourceBlock);

    const intro = el('div', { class: 'cloze-intro' });
    intro.textContent = `Wähle das fehlende ${q.targetLang === 'en' ? 'englische' : 'deutsche'} Wort:`;
    card.appendChild(intro);

    // Render blank sentence with styled slot
    const blank = el('div', { class: 'cloze-blank' });
    const parts = q.blankSentence.split('<<<BLANK>>>');
    blank.appendChild(document.createTextNode('„' + parts[0]));
    const slot = el('span', { class: 'cloze-blank-slot' });
    slot.textContent = '___';
    blank.appendChild(slot);
    blank.appendChild(document.createTextNode((parts[1] || '') + '"'));
    card.appendChild(blank);

    const grid = el('div', { class: 'choice-grid' });
    q.options.forEach((opt, i) => {
      const btn = el('button', { class: 'choice-btn', 'data-key': String(i + 1) });
      btn.textContent = opt;
      btn.addEventListener('click', () => onChoice(i, opt));
      grid.appendChild(btn);
    });
    card.appendChild(grid);
    card.appendChild(el('div', { id: 'reveal-slot' }));
  }

  card.appendChild(el('div', { id: 'result-slot' }));

  const skipRow = el('div', { class: 'skip-row', id: 'skip-row' });
  const skipBtn = el('button', { class: 'skip-btn' });
  skipBtn.textContent = 'Lösung zeigen';
  skipBtn.addEventListener('click', onSkip);
  skipRow.appendChild(skipBtn);
  card.appendChild(skipRow);

  host.appendChild(card);
}

function buildStarsInline(strength) {
  const wrap = el('span', { class: 'strength-stars', title: `Stärke: ${strength}/${MAX_STRENGTH}` });
  for (let i = 0; i < MAX_STRENGTH; i++) {
    const sd = document.createElement('div');
    sd.innerHTML = SVG_STAR;
    const s = sd.firstElementChild;
    s.classList.add('star');
    if (i < strength) s.classList.add('on');
    wrap.appendChild(s);
  }
  return wrap;
}

// ───────────────────────────────────────────────────────────────
// ANSWERS
// ───────────────────────────────────────────────────────────────
function markAllChoices(q, pickedIdx) {
  const acceptedLower = new Set(q.accepted.map(s => s.toLowerCase()));
  document.querySelectorAll('.choice-btn').forEach((btn, idx) => {
    btn.disabled = true;
    const opt = q.options[idx];
    if (acceptedLower.has(opt.toLowerCase())) btn.classList.add('correct');
    else if (idx === pickedIdx) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
}

function onChoice(i, picked) {
  if (answered) return;
  const q = currentQ;
  const acceptedLower = new Set(q.accepted.map(s => s.toLowerCase()));
  const right = acceptedLower.has(picked.toLowerCase());
  markAllChoices(q, i);
  grade(right, /* fromSkip */ false);
}

function onTypeCheck() {
  if (answered) return;
  const q = currentQ;
  const input = document.getElementById('type-input');
  const val = input.value.trim();
  if (!val) return;
  const right = checkTyping(val, q.accepted);
  input.disabled = true;
  input.classList.add(right ? 'right' : 'wrong');
  if (!right) {
    const reveal = document.getElementById('reveal-slot');
    if (reveal) {
      const div = el('div', { class: 'correct-reveal' });
      const label = q.accepted.length > 1 ? 'Akzeptiert' : 'Richtig';
      div.innerHTML = label + ': <strong></strong>';
      div.querySelector('strong').textContent = q.accepted.join(', ');
      reveal.appendChild(div);
    }
  }
  const checkBtn = document.getElementById('check-btn');
  if (checkBtn) checkBtn.remove();
  grade(right, false);
}

function onSkip() {
  if (answered) return;
  const q = currentQ;
  if (q.mode === 'choice' || q.mode === 'cloze') {
    markAllChoices(q, -1);
  } else if (q.mode === 'type') {
    const input = document.getElementById('type-input');
    if (input) { input.disabled = true; input.classList.add('wrong'); }
    const checkBtn = document.getElementById('check-btn'); if (checkBtn) checkBtn.remove();
    const reveal = document.getElementById('reveal-slot');
    if (reveal) {
      const div = el('div', { class: 'correct-reveal' });
      div.innerHTML = 'Lösung: <strong></strong>';
      div.querySelector('strong').textContent = q.accepted.join(', ');
      reveal.appendChild(div);
    }
  }
  grade(false, true);
}

function grade(right, fromSkip) {
  answered = true; isCorrect = right;
  const skipRow = document.getElementById('skip-row'); if (skipRow) skipRow.remove();

  const w = currentQ.raw;
  w.seen++;
  const oldStrength = w.strength;
  let starGained = false;

  if (right) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    if (w.strength < MAX_STRENGTH) {
      w.strength++;
      totalStars++;
      starGained = true;
    }
  } else {
    streak = 0;
    if (!fromSkip && w.strength > 0) w.strength = Math.max(0, w.strength - 1);
    const card = document.getElementById('card');
    if (card) { card.classList.add('shake'); setTimeout(() => card.classList.remove('shake'), 450); }
    // Falsch beantwortet → in 2-4 Schritten zurück in die Queue
    const insertAt = Math.min(queue.length, 2 + Math.floor(Math.random() * 3));
    queue.splice(insertAt, 0, { word: w, dir: currentQ.dir, mode: currentQ.mode });
  }

  answeredThisRound++;
  updateStats();
  updateStrip();
  showResult(right, fromSkip, starGained, oldStrength);
}

function showResult(right, fromSkip, starGained, oldStrength) {
  const q = currentQ;
  const slot = document.getElementById('result-slot');
  const banner = el('div', { class: `result ${right ? 'right' : 'wrong'}` });

  const text = el('div', { class: 'result-text' });
  text.innerHTML = right
    ? SVG_SPARK + ' Hervorragend'
    : (fromSkip ? SVG_X + ' Lösung angezeigt' : SVG_X + ' Nicht ganz');
  if (starGained) {
    const up = el('span', { class: 'star-up', html: SVG_STAR + ' +1' });
    // SVG_STAR is svg element, append as innerHTML works
    text.appendChild(up);
  }
  banner.appendChild(text);

  if (q.mode === 'cloze') {
    const reveal = el('div', { class: 'result-reveal' });
    reveal.innerHTML = (right ? 'Vollständiger Satz: ' : 'Richtig wäre: ') + `<span class="strong">${escapeHtml(q.fullSentence)}</span>`;
    banner.appendChild(reveal);
  } else if (!right) {
    // Show the answer once more after wrong
    const reveal = el('div', { class: 'result-reveal' });
    reveal.innerHTML = 'Antwort: <span class="strong"></span>';
    reveal.querySelector('.strong').textContent = q.accepted.join(', ');
    banner.appendChild(reveal);
  }

  const cont = el('button', { class: 'continue' });
  cont.innerHTML = 'Weiter ' + SVG_RIGHT;
  cont.addEventListener('click', advance);
  banner.appendChild(cont);
  slot.appendChild(banner);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function advance() {
  if (queue.length === 0) {
    // Runde fertig — schauen ob noch Wörter < MASTERY_THRESHOLD haben
    const remaining = pool.filter(w => w.strength < MASTERY_THRESHOLD);
    if (remaining.length === 0) {
      showFinish();
      return;
    }
    // Nächste Runde starten
    round++;
    answeredThisRound = 0;
    queue = buildRoundQueue();
    totalThisRound = queue.length;
    updateStrip();
    showRoundBanner();
    return;
  }
  const next = queue.shift();
  currentQ = generateQuestion(next);
  renderCurrent();
}

function showRoundBanner() {
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  const remaining = pool.filter(w => w.strength < MASTERY_THRESHOLD).length;
  const mastered = pool.length - remaining;
  const banner = el('div', { class: 'stage-banner' });
  banner.appendChild(el('h2', {}, `Runde ${round}`));
  banner.appendChild(el('p', {}, `${mastered} von ${pool.length} Wörtern hast du schon gemeistert. Weiter geht's mit den restlichen ${remaining}.`));
  const stats = el('div', { class: 'stage-stats' });
  stats.appendChild(makeStageStat(mastered, 'Gemeistert'));
  stats.appendChild(makeStageStat(totalStars, 'Sterne'));
  stats.appendChild(makeStageStat(bestStreak, 'Beste Serie'));
  banner.appendChild(stats);
  const btn = el('button', { class: 'stage-btn' });
  btn.textContent = 'Weiter';
  btn.addEventListener('click', () => advance());
  banner.appendChild(btn);
  host.appendChild(banner);
}

function makeStageStat(num, label) {
  const wrap = el('div', { class: 'stage-stat' });
  wrap.appendChild(el('div', { class: 'stage-stat-num' }, String(num)));
  wrap.appendChild(el('div', { class: 'stage-stat-label' }, label));
  return wrap;
}

function showFinish() {
  viewing = 'finish';
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  const banner = el('div', { class: 'stage-banner gold' });
  banner.appendChild(el('h2', {}, '✦ Alles gemeistert ✦'));
  banner.appendChild(el('p', {}, `Du hast alle ${pool.length} Wörter dieser Runde mit mindestens ${MASTERY_THRESHOLD} Sternen gelernt.`));
  const stats = el('div', { class: 'stage-stats' });
  stats.appendChild(makeStageStat(totalStars, 'Sterne'));
  stats.appendChild(makeStageStat(bestStreak, 'Beste Serie'));
  stats.appendChild(makeStageStat(round, 'Runden'));
  banner.appendChild(stats);
  const row = el('div', { style: 'display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:18px;' });
  const newBtn = el('button', { class: 'stage-btn' });
  newBtn.textContent = 'Neue Vokabeln';
  newBtn.addEventListener('click', reloadPool);
  row.appendChild(newBtn);
  const reviewBtn = el('button', { class: 'stage-btn', style: 'background:transparent; color:var(--cream); border:1px solid var(--cream);' });
  reviewBtn.textContent = 'Übersicht';
  reviewBtn.addEventListener('click', showOverview);
  row.appendChild(reviewBtn);
  banner.appendChild(row);
  host.appendChild(banner);
}

// ───────────────────────────────────────────────────────────────
// OVERVIEW
// ───────────────────────────────────────────────────────────────
function showOverview() {
  viewing = 'overview';
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  const ov = el('div', { class: 'overview' });
  const head = el('div', { class: 'overview-head' });
  head.appendChild(el('div', { class: 'overview-title' }, 'Vokabel-Pool'));
  const close = el('button', { class: 'secondary-btn' });
  close.innerHTML = '✕ Schließen';
  close.addEventListener('click', () => {
    viewing = 'training';
    if (currentQ && !answered) renderCurrent();
    else advance();
  });
  head.appendChild(close);
  ov.appendChild(head);

  const table = el('table', { class: 'overview-table' });
  const sorted = [...pool].sort((a, b) => a.strength - b.strength || a.en.localeCompare(b.en));
  for (const w of sorted) {
    const tr = el('tr');
    const enTd = el('td', { class: 'ov-en' }, w.en);
    const deTd = el('td', { class: 'ov-de' }, w.de);
    const posTd = el('td', { class: 'ov-pos' }, w.pos || '');
    const starsTd = el('td');
    const stars = el('span', { class: 'ov-stars' });
    for (let i = 0; i < MAX_STRENGTH; i++) {
      const sd = document.createElement('div'); sd.innerHTML = SVG_STAR;
      const s = sd.firstElementChild;
      if (i < w.strength) s.classList.add('on');
      stars.appendChild(s);
    }
    starsTd.appendChild(stars);
    const speakTd = el('td', { style: 'text-align:right' });
    const sb = el('button', { class: 'ov-speak', title: 'Anhören', html: SVG_SPEAKER });
    sb.addEventListener('click', () => speak(w.de, 'de'));
    speakTd.appendChild(sb);
    tr.appendChild(enTd); tr.appendChild(deTd); tr.appendChild(posTd); tr.appendChild(starsTd); tr.appendChild(speakTd);
    table.appendChild(tr);
  }
  ov.appendChild(table);
  host.appendChild(ov);
}

// ───────────────────────────────────────────────────────────────
// STATS / STRIP
// ───────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('streak-val').textContent = streak;
  document.getElementById('stars-val').textContent = totalStars;
  document.getElementById('words-mastered').textContent = pool.filter(w => w.strength >= MASTERY_THRESHOLD).length;
}

function updateStrip() {
  document.getElementById('round-num').textContent = round;
  document.getElementById('strip-done').textContent = answeredThisRound;
  document.getElementById('strip-total').textContent = totalThisRound;
  const pct = totalThisRound > 0 ? (answeredThisRound / totalThisRound) * 100 : 0;
  document.getElementById('strip-fill').style.width = pct + '%';
}

// ───────────────────────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (viewing !== 'training') return;
  // Ignore when typing in input
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' && currentQ?.mode !== 'choice' && currentQ?.mode !== 'cloze') return;

  if (e.key === 'Enter') {
    // If answered, advance
    if (answered) {
      e.preventDefault();
      advance();
    }
  } else if (e.key === '?') {
    if (!answered) { e.preventDefault(); onSkip(); }
  } else if (['1','2','3','4'].includes(e.key)) {
    if (answered) return;
    if (currentQ?.mode !== 'choice' && currentQ?.mode !== 'cloze') return;
    const idx = parseInt(e.key) - 1;
    const opt = currentQ.options[idx];
    if (opt !== undefined) {
      e.preventDefault();
      onChoice(idx, opt);
    }
  }
});

// ───────────────────────────────────────────────────────────────
// VIEW SWITCHING
// ───────────────────────────────────────────────────────────────
function showView(name) {
  document.getElementById('loading-view').classList.toggle('hidden', name !== 'loading');
  document.getElementById('error-view').classList.toggle('hidden', name !== 'error');
  document.getElementById('app-view').classList.toggle('hidden', name !== 'app');
}

async function reloadPool() {
  showView('loading');
  document.getElementById('progress-done').textContent = 0;
  document.getElementById('progress-fill').style.width = '0%';
  setDetail('');
  translateBlocked = false;
  pool = []; queue = []; currentQ = null;
  streak = 0; totalStars = 0; round = 1; answeredThisRound = 0; totalThisRound = 0;
  bestStreak = 0;
  try {
    pool = await buildPool(POOL_SIZE);
    if (pool.length < 6) {
      const msg = translateBlocked
        ? 'Die Übersetzungs-API hat das Tageslimit erreicht. Versuche es später nochmal.'
        : 'Konnte nicht genug Vokabeln laden. APIs scheinen langsam zu sein.';
      document.getElementById('error-msg').textContent = msg;
      showView('error');
      return;
    }
    document.getElementById('pool-size').textContent = pool.length;
    showView('app');
    viewing = 'training';
    updateStats();
    queue = buildRoundQueue();
    totalThisRound = queue.length;
    updateStrip();
    advance();
  } catch (e) {
    document.getElementById('error-msg').textContent = 'Etwas ist schiefgegangen: ' + (e?.message || 'unbekannter Fehler');
    showView('error');
  }
}

async function init() {
  showView('loading');
  document.getElementById('retry-btn').addEventListener('click', init);
  document.getElementById('refresh-btn').addEventListener('click', reloadPool);
  document.getElementById('view-overview-btn').addEventListener('click', showOverview);
  document.getElementById('overview-chip').addEventListener('click', showOverview);
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = refreshVoices;
    refreshVoices();
  }
  await reloadPool();
}

init();
</script>
