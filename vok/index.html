<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexikon — Ein Vokabel-Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4ebd9;
    --cream-2: #ede1c6;
    --paper: #fbf5e7;
    --ink: #2a1e10;
    --ink-soft: #5a4a30;
    --muted: #8a7a5c;
    --rule: #d8c9a3;
    --rule-soft: #e5dcc1;
    --bordeaux: #7a1c1c;
    --forest: #1c3d2e;
    --ember: #c2410c;
    --gold: #e6c879;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 1px 1px, rgba(122,28,28,0.06) 1px, transparent 0) 0 0 / 22px 22px,
      linear-gradient(135deg, var(--cream) 0%, var(--cream-2) 100%);
    background-attachment: fixed;
    padding: 24px 20px 60px;
    line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    padding-bottom: 16px; margin-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon { width: 26px; height: 26px; color: var(--bordeaux); flex-shrink: 0; }
  .brand-title {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1;
  }
  .brand-sub {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-top: 5px;
  }
  .stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
  }
  .chip svg { width: 16px; height: 16px; }
  .chip-flame { color: var(--ember); }

  .phase-bar {
    max-width: 720px; margin: 0 auto 20px;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 4px; padding: 12px 16px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .phase-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 14px; color: var(--ink-soft); flex-shrink: 0;
  }
  .phase-label strong { font-style: normal; color: var(--bordeaux); font-weight: 600; }
  .phase-track {
    flex: 1; min-width: 120px; height: 6px;
    background: var(--rule-soft); border-radius: 99px; overflow: hidden;
  }
  .phase-fill {
    height: 100%; background: var(--bordeaux);
    transition: width 0.4s ease;
  }
  .phase-count {
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    flex-shrink: 0;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 36px 32px;
    box-shadow:
      0 1px 0 var(--rule),
      0 8px 24px -12px rgba(42,30,16,0.15),
      0 24px 60px -24px rgba(42,30,16,0.2);
    position: relative;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .dir-row { display: flex; align-items: center; gap: 8px; }
  .flag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 9px; border-radius: 4px; color: var(--cream);
  }
  .flag-en { background: var(--forest); }
  .flag-de { background: var(--bordeaux); }
  .arrow { color: var(--muted); }
  .mode-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 13px; color: var(--muted);
  }

  .prompt-word {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 7vw, 56px);
    font-weight: 600; letter-spacing: -0.02em; line-height: 1.1;
    margin-bottom: 8px; text-align: center;
    flex-wrap: wrap;
  }
  .speak-btn {
    background: transparent; border: 1px solid var(--rule); border-radius: 999px;
    width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--bordeaux); cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, transform 0.15s;
  }
  .speak-btn:hover { background: var(--cream); transform: scale(1.05); }
  .speak-btn svg { width: 18px; height: 18px; }
  .pos {
    text-align: center; font-style: italic;
    font-family: 'Fraunces', serif; color: var(--muted);
    font-size: 14px; margin-bottom: 28px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .choice-btn {
    padding: 18px 16px;
    border: 2px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    border-radius: 4px;
    font-size: 17px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }
  .choice-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--ink-soft); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: #e8f0e4; border-color: var(--forest); color: var(--forest); }
  .choice-btn.wrong { background: #f5dede; border-color: var(--bordeaux); color: var(--bordeaux); }
  .choice-btn.dim { opacity: 0.4; }

  .input {
    width: 100%; padding: 16px 18px;
    font-size: 18px;
    border: 2px solid var(--rule);
    border-radius: 4px;
    font-family: 'Fraunces', serif;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .input:focus { border-color: var(--ink-soft); }
  .input.right { border-color: var(--forest); background: #e8f0e4; }
  .input.wrong { border-color: var(--bordeaux); background: #f5dede; }
  .correct-reveal {
    margin-top: 12px; font-family: 'Fraunces', serif; font-style: italic;
    color: var(--bordeaux); font-size: 15px;
  }

  .sentence-prompt {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: clamp(18px, 3vw, 22px); text-align: center; line-height: 1.4;
    margin-bottom: 24px;
  }
  .sentence-target {
    min-height: 70px; padding: 14px;
    background: var(--cream);
    border: 1px dashed var(--rule);
    border-radius: 4px;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
    margin-bottom: 20px;
  }
  .sentence-placeholder {
    color: #a89876; font-style: italic; font-family: 'Fraunces', serif;
    margin: auto;
  }
  .token {
    padding: 9px 14px; border-radius: 4px;
    font-size: 15px; cursor: pointer; font-family: inherit; font-weight: 500;
    border: 1px solid var(--rule);
    background: var(--paper); color: var(--ink);
    transition: transform 0.12s;
    animation: pop 0.2s ease;
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .token:hover:not(:disabled) { transform: translateY(-2px); }
  .token.picked { background: var(--forest); color: var(--cream); border-color: var(--forest); }
  .token:disabled { cursor: default; opacity: 0.5; }

  .flash-front { text-align: center; margin-bottom: 16px; }
  .flash-word {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 8vw, 64px);
    font-weight: 600; letter-spacing: -0.02em; line-height: 1;
    flex-wrap: wrap;
  }
  .flash-back {
    border-top: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    padding: 20px 0; margin: 0 0 20px;
    animation: revealDown 0.3s ease;
  }
  @keyframes revealDown {
    from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
    to { opacity: 1; max-height: 600px; padding-top: 20px; padding-bottom: 20px; }
  }
  .flash-answer {
    font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600;
    text-align: center; margin-bottom: 12px; color: var(--bordeaux);
  }
  .definition {
    font-family: 'Fraunces', serif; font-style: italic;
    text-align: center; color: var(--ink-soft); font-size: 15px;
    margin-bottom: 14px;
  }
  .example-block {
    background: var(--cream); padding: 14px 18px;
    border-left: 3px solid var(--bordeaux);
    border-radius: 2px;
  }
  .example-en { font-family: 'Fraunces', serif; font-size: 15px; margin-bottom: 4px; }
  .example-de { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--ink-soft); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px;
    border-radius: 4px; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 600; letter-spacing: 0.03em;
    border: none; transition: transform 0.12s, opacity 0.12s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--bordeaux); color: var(--cream); width: 100%; }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--rule);
  }
  .btn-grade {
    background: var(--paper); border: 2px solid; flex: 1;
  }
  .btn-grade.no { color: var(--bordeaux); border-color: var(--bordeaux); }
  .btn-grade.yes { color: var(--forest); border-color: var(--forest); }
  .btn-row { display: flex; gap: 12px; }
  .mt-16 { margin-top: 16px; }

  .result {
    margin-top: 24px; padding: 20px 22px; border-radius: 4px;
    color: var(--cream);
    animation: fadeUp 0.3s ease;
  }
  .result.right { background: var(--forest); }
  .result.wrong { background: var(--bordeaux); }
  .result-text {
    font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .result-example { font-size: 14px; line-height: 1.5; margin-bottom: 14px; }
  .result-example .de { opacity: 0.78; font-style: italic; }
  .continue {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px;
    background: var(--cream); color: var(--ink);
    border: none; border-radius: 4px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; font-family: inherit; width: 100%;
  }

  .pool-refresh {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin: 24px auto 0; padding: 10px 14px;
    background: transparent; color: var(--muted);
    border: none; cursor: pointer; font-family: inherit;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    width: 100%;
  }
  .pool-refresh:hover { color: var(--bordeaux); }
  .pool-refresh svg { width: 12px; height: 12px; }

  footer.bottom {
    max-width: 720px; margin: 40px auto 0;
    padding-top: 16px; border-top: 1px solid var(--rule-soft);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }

  .loading {
    max-width: 480px; margin: 12vh auto 0; text-align: center; padding: 0 20px;
  }
  .loading-icon { color: var(--bordeaux); animation: spin 2s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .loading-title {
    font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600;
    letter-spacing: -0.02em; margin: 24px 0 6px;
  }
  .loading-sub {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--muted); margin-bottom: 28px;
  }
  .loading-detail {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-top: 14px; min-height: 16px;
  }
  .progress-track {
    height: 6px; background: var(--rule-soft); border-radius: 99px;
    overflow: hidden; margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%; background: var(--bordeaux);
    transition: width 0.3s ease;
  }
  .loading-count {
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .error-box {
    max-width: 480px; margin: 10vh auto 0; padding: 32px;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 4px;
    text-align: center;
  }
  .error-title {
    font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600;
    margin-bottom: 12px;
  }
  .error-msg { color: var(--ink-soft); margin-bottom: 24px; font-size: 14px; }

  .stage-banner {
    background: linear-gradient(135deg, var(--forest) 0%, #2a5341 100%);
    color: var(--cream);
    padding: 28px 30px; border-radius: 4px;
    text-align: center; margin-bottom: 20px;
    animation: fadeUp 0.4s ease;
  }
  .stage-banner h2 {
    font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600;
    margin: 0 0 8px; letter-spacing: -0.01em;
  }
  .stage-banner p { margin: 0; opacity: 0.85; font-size: 14px; }
  .stage-banner .stage-btn {
    margin-top: 18px;
    background: var(--cream); color: var(--ink);
    border: none; padding: 10px 20px; border-radius: 4px;
    font-family: inherit; font-weight: 700; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  }

  .hidden { display: none !important; }

  @media (max-width: 540px) {
    body { padding: 16px 14px 60px; }
    .card { padding: 24px 18px; }
    .brand-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="loading-view" class="loading">
  <div class="loading-icon">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
  </div>
  <h1 class="loading-title">Lexikon wird geöffnet</h1>
  <p class="loading-sub">Wörter werden aus dem Äther gesammelt</p>
  <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
  <p class="loading-count"><span id="progress-done">0</span> / <span id="progress-total">12</span> Vokabeln</p>
  <p class="loading-detail" id="loading-detail"></p>
</div>

<div id="error-view" class="error-box hidden">
  <h2 class="error-title">Hmm.</h2>
  <p class="error-msg" id="error-msg">Die Wörterbuch-Verbindung ist gerade gestört. Vielleicht später erneut versuchen?</p>
  <button class="btn btn-primary" id="retry-btn">Erneut versuchen</button>
</div>

<div id="app-view" class="wrap hidden">
  <header class="top">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <div>
        <div class="brand-title">Lexikon</div>
        <div class="brand-sub">Ein Vokabel-Journal</div>
      </div>
    </div>
    <div class="stats">
      <div class="chip">
        <svg class="chip-flame" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>
        <span id="streak-val">0</span>
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gold)">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>
        <span>Beste: <span id="best-val">0</span></span>
      </div>
    </div>
  </header>

  <div class="phase-bar">
    <div class="phase-label">Phase <strong id="phase-num">I</strong> · <span id="phase-name">Vokabeln</span></div>
    <div class="phase-track"><div id="phase-fill" class="phase-fill" style="width:0%"></div></div>
    <div class="phase-count"><span id="phase-done">0</span> / <span id="phase-total">0</span></div>
  </div>

  <main>
    <div id="card-host"></div>
    <button class="pool-refresh" id="refresh-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Frische Wörter aus dem Pool ziehen
    </button>
  </main>

  <footer class="bottom">
    <div>Pool: <span id="pool-size">0</span> Vokabeln · live aus öffentlichen APIs</div>
    <div>Aktuelle Serie: <span id="streak-foot">0</span></div>
  </footer>
</div>

<script>
const COMMON_SEED_WORDS = [
  'forest','river','mountain','window','letter','garden','kitchen','summer','winter','evening',
  'silver','golden','travel','silence','laughter','memory','shadow','journey','wisdom','courage',
  'bridge','candle','autumn','feather','harbor','ladder','meadow','ocean','pencil','quiet',
  'ribbon','sunrise','thunder','umbrella','village','whisper','morning','street','flower','dream',
  'family','school','music','friend','water','house','book','bread','cloud','beach',
  'corner','dancer','engine','fabric','glance','helmet','island','jacket','kettle','lantern',
  'marble','needle','orchard','pillow','quill','rabbit','saddle','tunnel','velvet','wagon',
  'breakfast','answer','question','journey','picture','language','animal','flower','painting','library',
  'butter','silver','laughter','distance','daughter','brother','sister','mother','father','neighbor'
];

const POOL_SIZE = 10;

let pool = [];
let phase = 1;
let phaseQueue = [];
let phaseTotal = 0;
let phaseDone = 0;
let currentQ = null;
let streak = 0;
let bestStreak = 0;
let state = { answered: false, correct: null };
let sentencePick = [];
let sentenceBank = [];

function fetchWithTimeout(url, ms = 7000) {
  return Promise.race([
    fetch(url),
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

const STOP_WORDS = new Set([
  'the','and','for','are','but','not','you','all','can','had','her','was','one','our','out',
  'day','get','has','him','his','how','its','may','new','now','old','see','two','way','who',
  'boy','did','man','men','put','say','she','too','use','any','few','let','own','top','try',
  'why','yes','far','off','run','set','sit','ten','win','yet','ago','air','arm','art','ask',
  'bad','bag','bed','big','bit','box','buy','car','cup','cut','dad','die','dog','eat','egg',
  'end','eye','fix','fly','fun','god','got','gun','guy','hat','hit','hot','ice','job','key',
  'kid','law','lay','leg','lie','lot','low','map','mom','mrs','net','oil','pay','red','sir',
  'son','sun','tax','tea','war','yet','add','any','bus','due','low','mid','non','per','via',
  'tom','jim','bob','sam','joe','ben','ann','sue','him','her','his','its','our','their','your',
  'this','that','these','those','what','when','where','which','while','with','from','have','will','would',
  'could','should','about','after','again','also','been','before','being','between','both',
  'doing','does','down','each','even','from','further','here','into','just','more','most','only',
  'other','over','same','some','such','than','then','there','they','through','under','until',
  'very','were','what','where','will','with','would','your','yours','about','above','below',

]);

const FREQUENCY_LISTS = [
  'https://raw.githubusercontent.com/first20hours/google-10000-english/master/google-10000-english-usa-no-swears-medium.txt',
  'https://raw.githubusercontent.com/first20hours/google-10000-english/master/google-10000-english-no-swears.txt',
];

let cachedFrequencyWords = null;

async function loadFrequencyList() {
  if (cachedFrequencyWords) return cachedFrequencyWords;
  for (const url of FREQUENCY_LISTS) {
    try {
      const r = await fetchWithTimeout(url, 9000);
      if (!r.ok) continue;
      const txt = await r.text();
      const lines = txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      const filtered = lines
        .slice(0, 2500)
        .filter(w => /^[a-z]{4,9}$/.test(w))
        .filter(w => !STOP_WORDS.has(w));
      if (filtered.length > 100) {
        cachedFrequencyWords = filtered;
        return filtered;
      }
    } catch (e) {}
  }
  return null;
}

async function fetchSeedWords(n) {
  const list = await loadFrequencyList();
  if (list && list.length >= n) {
    return shuffle([...list]).slice(0, n);
  }
  return shuffle([...COMMON_SEED_WORDS]).slice(0, n);
}

async function fetchDictionary(word) {
  try {
    const r = await fetchWithTimeout(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`, 6000);
    if (!r.ok) return null;
    const data = await r.json();
    if (!Array.isArray(data) || !data[0]) return null;
    const entry = data[0];
    let pos = null, definition = null, example = null;
    for (const m of (entry.meanings || [])) {
      if (!pos) pos = m.partOfSpeech;
      for (const d of (m.definitions || [])) {
        if (!definition) definition = d.definition;
        if (d.example && !example) {
          const wc = d.example.split(/\s+/).length;
          if (wc >= 3 && wc <= 10) { example = d.example; break; }
        }
      }
      if (example) break;
    }
    return { pos, definition, example };
  } catch (e) { return null; }
}

async function translate(text, direction) {
  try {
    const pair = direction === 'en-de' ? 'en|de' : 'de|en';
    const r = await fetchWithTimeout(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`, 7000);
    if (!r.ok) return null;
    const data = await r.json();
    const primary = data?.responseData?.translatedText?.trim();
    if (!primary) return null;
    const pl = primary.toLowerCase();
    if (pl.includes('mymemory warning') || pl.includes('invalid') || pl.includes('please select') || pl.includes('quota exceeded')) return null;
    const all = new Set([primary]);
    if (Array.isArray(data.matches)) {
      for (const m of data.matches) {
        const t = (m.translation || '').trim();
        if (!t) continue;
        const tl = t.toLowerCase();
        if (tl.includes('mymemory warning') || tl.includes('invalid')) continue;
        if (t.split(/\s+/).length > 3) continue;
        const q = typeof m.quality === 'string' ? parseInt(m.quality) : m.quality;
        if (q != null && q < 60) continue;
        all.add(t);
      }
    }
    return { primary, all: [...all] };
  } catch (e) { return null; }
}

async function translateSimple(text, direction) {
  const r = await translate(text, direction);
  return r ? r.primary : null;
}

async function buildPool(size) {
  document.getElementById('progress-total').textContent = size;
  setDetail('Hole englische Wörter…');
  const words = await fetchSeedWords(Math.ceil(size * 3.5));
  setDetail('Übersetze und schlage nach…');
  const newPool = [];
  const seen = new Set();
  for (const raw of words) {
    if (newPool.length >= size) break;
    const w = (raw || '').toLowerCase().trim();
    if (!/^[a-z]{4,9}$/.test(w)) continue;
    if (seen.has(w)) continue;
    if (STOP_WORDS.has(w)) continue;
    seen.add(w);
    setDetail(`„${w}" wird geprüft…`);

    const [dict, deResult] = await Promise.all([fetchDictionary(w), translate(w, 'en-de')]);
    if (!deResult) continue;

    const dePrimary = deResult.primary;
    const dePrimaryLower = dePrimary.toLowerCase();
    if (dePrimaryLower === w) continue;
    if (dePrimary.split(/\s+/).length > 2) continue;
    if (!/^[a-zäöüßA-ZÄÖÜ\-]+$/.test(dePrimary)) continue;

    const backResult = await translate(dePrimary, 'de-en');
    if (!backResult) continue;
    const backAllLower = backResult.all.map(s => s.toLowerCase());
    if (!backAllLower.includes(w)) continue;

    const deAll = deResult.all
      .filter(t => /^[a-zäöüßA-ZÄÖÜ\-]+$/.test(t))
      .filter(t => t.toLowerCase() !== w);
    const enAll = backResult.all
      .filter(t => /^[a-zA-Z\-]+$/.test(t))
      .map(t => t.toLowerCase());
    if (!enAll.includes(w)) enAll.unshift(w);

    let exampleDe = null;
    let exampleEn = dict?.example || null;
    if (exampleEn) {
      const ex = await translateSimple(exampleEn, 'en-de');
      if (ex) exampleDe = ex;
      else exampleEn = null;
    }

    newPool.push({
      en: w,
      de: dePrimary,
      deAll: [...new Set([dePrimary, ...deAll])],
      enAll: [...new Set(enAll)],
      pos: dict?.pos || null,
      definition: dict?.definition || null,
      exampleEn,
      exampleDe,
    });
    document.getElementById('progress-done').textContent = newPool.length;
    document.getElementById('progress-fill').style.width = ((newPool.length / size) * 100) + '%';
  }
  setDetail('');
  return newPool;
}

function setDetail(s) {
  const el = document.getElementById('loading-detail');
  if (el) el.textContent = s;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickDistractors(correctWord, key, allAccepted, n) {
  const acceptedLower = new Set(allAccepted.map(s => s.toLowerCase()));
  const filtered = pool.filter(p => !acceptedLower.has(p[key].toLowerCase()));
  return shuffle(filtered).slice(0, n).map(p => p[key]);
}

function buildPhase1Queue() {
  const modes = ['choice', 'type', 'flash'];
  const items = [];
  for (const w of pool) {
    items.push({ word: w, dir: 'en-de', mode: modes[Math.floor(Math.random() * modes.length)] });
    items.push({ word: w, dir: 'de-en', mode: modes[Math.floor(Math.random() * modes.length)] });
  }
  return shuffle(items);
}

function buildPhase2Queue() {
  const capable = pool.filter(w =>
    w.exampleEn && w.exampleDe &&
    w.exampleEn.split(/\s+/).length >= 3 &&
    w.exampleEn.split(/\s+/).length <= 10 &&
    w.exampleDe.split(/\s+/).length >= 3
  );
  const items = [];
  for (const w of capable) {
    items.push({ word: w, dir: 'en-de', mode: 'sentence' });
    items.push({ word: w, dir: 'de-en', mode: 'sentence' });
  }
  return shuffle(items);
}

function generateQuestion(item) {
  const w = item.word;
  const dir = item.dir;
  const mode = item.mode;

  if (mode === 'sentence') {
    const sourceLang = dir === 'en-de' ? 'en' : 'de';
    const targetLang = dir === 'en-de' ? 'de' : 'en';
    const promptText = sourceLang === 'en' ? w.exampleEn : w.exampleDe;
    const answerText = targetLang === 'en' ? w.exampleEn : w.exampleDe;
    const tokens = answerText.replace(/[.,!?;:"„"]/g, '').split(/\s+/).filter(Boolean);
    const tokensLower = new Set(tokens.map(t => t.toLowerCase()));
    const extraPool = pool
      .map(p => targetLang === 'en' ? p.en : p.de)
      .filter(t => t && !tokensLower.has(t.toLowerCase()));
    const extras = shuffle(extraPool).slice(0, Math.min(3, extraPool.length));
    const bank = shuffle([...tokens, ...extras]).map((text, id) => ({ id, text }));
    return { mode, dir, sourceLang, targetLang, prompt: promptText, answerTokens: tokens, bank, raw: w };
  }

  const promptKey = dir === 'en-de' ? 'en' : 'de';
  const answerKey = dir === 'en-de' ? 'de' : 'en';
  const accepted = dir === 'en-de' ? (w.deAll || [w.de]) : (w.enAll || [w.en]);
  const primary = w[answerKey];

  if (mode === 'choice') {
    const distractors = pickDistractors(primary, answerKey, accepted, 3);
    return { mode, dir, prompt: w[promptKey], correct: primary, accepted, options: shuffle([primary, ...distractors]), raw: w };
  }
  if (mode === 'type') {
    return { mode, dir, prompt: w[promptKey], correct: primary, accepted, raw: w };
  }
  return { mode: 'flash', dir, raw: w, promptKey, answerKey };
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/[.,!?;:"'„"]/g, '').replace(/\s+/g, ' ');
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[m][n];
}

function checkTyping(user, acceptedList) {
  const u = normalize(user);
  const list = Array.isArray(acceptedList) ? acceptedList : [acceptedList];
  for (const correct of list) {
    const c = normalize(correct);
    if (u === c) return true;
    const tolerance = c.length <= 5 ? 1 : c.length <= 10 ? 2 : 3;
    if (levenshtein(u, c) <= tolerance) return true;
  }
  return false;
}

let voicesReady = false;
let voiceCache = { en: null, de: null };

function refreshVoices() {
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return;
  voicesReady = true;
  voiceCache.en =
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang === 'en_US') ||
    voices.find(v => /^en[-_]US/i.test(v.lang)) ||
    voices.find(v => v.lang.toLowerCase().startsWith('en')) ||
    null;
  voiceCache.de =
    voices.find(v => v.lang === 'de-DE') ||
    voices.find(v => v.lang === 'de_DE') ||
    voices.find(v => /^de[-_]DE/i.test(v.lang)) ||
    voices.find(v => v.lang.toLowerCase().startsWith('de')) ||
    null;
}

function hasVoiceFor(lang) {
  return !!voiceCache[lang];
}

function speak(text, lang) {
  try {
    if (!window.speechSynthesis || !text) return;
    if (!voicesReady) refreshVoices();
    const voice = voiceCache[lang];
    if (!voice) return;
    const voiceLangLower = voice.lang.toLowerCase();
    const expectedPrefix = lang === 'de' ? 'de' : 'en';
    if (!voiceLangLower.startsWith(expectedPrefix)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = voice;
    u.lang = voice.lang;
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'style') node.setAttribute('style', v);
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function speakerButton(text, lang) {

function renderQuestion() {

  const toLang = q.dir === 'en-de' ? 'de' : 'en';

  dirRow.appendChild(arrow.firstChild);
  dirRow.appendChild(flagEl(toLang));
  head.appendChild(dirRow);

  modeLabel.textContent = modeLabelText(q.mode);
  head.appendChild(modeLabel);
  card.appendChild(head);

  if (q.mode === 'choice') {
    const promptWord = el('div', { class: 'prompt-word' });

    span.textContent = q.prompt;
    promptWord.appendChild(span);
    promptWord.appendChild(speakerButton(q.prompt, fromLang));

    if (q.raw.pos) {
      const pos = el('div', { class: 'pos' });
      pos.textContent = q.raw.pos;
      card.appendChild(pos);
    } else {
      card.appendChild(el('div', { style: 'height:20px' }));
    }
    const grid = el('div', { class: 'choice-grid' });
    q.options.forEach((opt, i) => {
      const btn = el('button', { class: 'choice-btn' });
      btn.textContent = opt;
      btn.addEventListener('click', () => onChoice(i, btn));
      grid.appendChild(btn);
    });
    card.appendChild(grid);
  } else if (q.mode === 'type') {
    const promptWord = el('div', { class: 'prompt-word' });
    const span = el('span');
    span.textContent = q.prompt;
    promptWord.appendChild(span);
    promptWord.appendChild(speakerButton(q.prompt, fromLang));
    card.appendChild(promptWord);
    if (q.raw.pos) {
      const pos = el('div', { class: 'pos' });
      pos.textContent = q.raw.pos;
      card.appendChild(pos);
    } else {
      card.appendChild(el('div', { style: 'height:20px' }));
    }
    const input = el('input', { class: 'input', id: 'type-input', placeholder: `Übersetzung auf ${toLang === 'de' ? 'Deutsch' : 'Englisch'} …` });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (state.answered) advance();
        else onTypeCheck();
      }
    });
    card.appendChild(input);
    card.appendChild(el('div', { id: 'reveal-slot' }));
    const checkBtn = el('button', { class: 'btn btn-primary mt-16', id: 'check-btn' });
    checkBtn.textContent = 'Prüfen';
    checkBtn.addEventListener('click', onTypeCheck);
    card.appendChild(checkBtn);
    setTimeout(() => input.focus(), 60);
  } else if (q.mode === 'sentence') {
    sentencePick = [];
    sentenceBank = [...q.bank];
    const promptEl = el('div', { class: 'sentence-prompt' });
    promptEl.textContent = `„${q.prompt}"`;
    card.appendChild(promptEl);

    const speakerRow = el('div', { style: 'display:flex; justify-content:center; margin-bottom:18px;' });
    speakerRow.appendChild(speakerButton(q.prompt, q.sourceLang));
    card.appendChild(speakerRow);

    card.appendChild(el('div', { class: 'sentence-target', id: 'target-zone' }));
    card.appendChild(el('div', { id: 'bank-zone', style: 'display:flex; flex-wrap:wrap; gap:8px;' }));
    card.appendChild(el('div', { id: 'reveal-slot' }));
    const checkBtn = el('button', { class: 'btn btn-primary mt-16', id: 'check-btn' });
    checkBtn.textContent = 'Prüfen';
    checkBtn.addEventListener('click', onSentenceCheck);
    card.appendChild(checkBtn);

    const front = el('div', { class: 'flash-front' });
    const word = el('div', { class: 'flash-word' });
    const span = el('span');

    word.appendChild(span);
    word.appendChild(speakerButton(q.raw[q.promptKey], q.promptKey));
    front.appendChild(word);
    if (q.raw.pos) {
      const pos = el('div', { class: 'pos' });
      pos.textContent = q.raw.pos;
      front.appendChild(pos);
    }

    card.appendChild(el('div', { id: 'flash-reveal' }));
    const actionBtn = el('button', { class: 'btn btn-primary', id: 'flash-action' });
    actionBtn.textContent = 'Aufdecken';
    actionBtn.addEventListener('click', onFlashReveal);
    card.appendChild(actionBtn);
  }

  card.appendChild(el('div', { id: 'result-slot' }));
  host.appendChild(card);

  if (q.mode === 'sentence') renderSentence();
}

function renderSentence() {
  const target = document.getElementById('target-zone');
  const bank = document.getElementById('bank-zone');
  if (!target || !bank) return;
  target.innerHTML = '';
  bank.innerHTML = '';
  if (sentencePick.length === 0) {
    const ph = el('span', { class: 'sentence-placeholder' });
    ph.textContent = 'Tippe die Wörter unten in der richtigen Reihenfolge an';
    target.appendChild(ph);
  } else {
    sentencePick.forEach(t => {
      const btn = el('button', { class: 'token picked' });
      btn.textContent = t.text;
      if (state.answered) btn.disabled = true;
      else btn.addEventListener('click', () => moveToBank(t.id));
      target.appendChild(btn);
    });
  }
  sentenceBank.forEach(t => {
    const btn = el('button', { class: 'token' });
    btn.textContent = t.text;
    if (state.answered) btn.disabled = true;
    else btn.addEventListener('click', () => moveToPick(t.id));
    bank.appendChild(btn);
  });
}

function moveToPick(id) {
  if (state.answered) return;
  const idx = sentenceBank.findIndex(t => t.id === id);
  if (idx < 0) return;
  const [t] = sentenceBank.splice(idx, 1);
  sentencePick.push(t);
  renderSentence();
}

function moveToBank(id) {
  if (state.answered) return;
  const idx = sentencePick.findIndex(t => t.id === id);
  if (idx < 0) return;
  const [t] = sentencePick.splice(idx, 1);
  sentenceBank.push(t);
  renderSentence();
}

function grade(isRight) {
  state.answered = true;
  state.correct = isRight;
  if (isRight) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    phaseDone++;
  } else {
    streak = 0;
    const card = document.getElementById('card');
    if (card) {
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 500);
    }
  }
  updateStats();
  updatePhaseBar();
  showResult();
}

function updateStats() {
  document.getElementById('streak-val').textContent = streak;
  document.getElementById('best-val').textContent = bestStreak;
  document.getElementById('streak-foot').textContent = streak;
}

function updatePhaseBar() {
  document.getElementById('phase-num').textContent = phase === 1 ? 'I' : 'II';
  document.getElementById('phase-name').textContent = phase === 1 ? 'Vokabeln' : 'Sätze';
  document.getElementById('phase-done').textContent = phaseDone;
  document.getElementById('phase-total').textContent = phaseTotal;
  const pct = phaseTotal > 0 ? (phaseDone / phaseTotal) * 100 : 0;
  document.getElementById('phase-fill').style.width = pct + '%';
}

function onChoice(i, btnEl) {
  if (state.answered) return;
  const q = currentQ;
  const picked = q.options[i];
  const acceptedLower = new Set((q.accepted || [q.correct]).map(s => s.toLowerCase()));
  const isRight = acceptedLower.has(picked.toLowerCase());
  document.querySelectorAll('.choice-btn').forEach((btn, idx) => {
    btn.disabled = true;
    const opt = q.options[idx];
    if (acceptedLower.has(opt.toLowerCase())) btn.classList.add('correct');
    else if (idx === i) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
  grade(isRight);
}

function onTypeCheck() {
  if (state.answered) return;
  const q = currentQ;
  const input = document.getElementById('type-input');
  const val = input.value.trim();
  if (!val) return;
  const isRight = checkTyping(val, q.accepted || [q.correct]);
  input.disabled = true;
  input.classList.add(isRight ? 'right' : 'wrong');
  if (!isRight) {
    const reveal = document.getElementById('reveal-slot');
    const div = el('div', { class: 'correct-reveal' });
    const accepted = q.accepted || [q.correct];
    const label = accepted.length > 1 ? 'Akzeptiert' : 'Richtig';
    div.innerHTML = label + ': <strong></strong>';
    div.querySelector('strong').textContent = accepted.join(', ');
    reveal.appendChild(div);
  }
  document.getElementById('check-btn').remove();
  grade(isRight);
}

function onSentenceCheck() {
  if (state.answered) return;
  const q = currentQ;
  if (sentencePick.length === 0) return;
  const built = sentencePick.map(t => t.text).join(' ');
  const target = q.answerTokens.join(' ');
  const isRight = normalize(built) === normalize(target);
  if (!isRight) {
    const reveal = document.getElementById('reveal-slot');
    const div = el('div', { class: 'correct-reveal' });
    div.innerHTML = 'Richtig: <strong></strong>';
    div.querySelector('strong').textContent = q.answerTokens.join(' ');
    reveal.appendChild(div);
  }
  document.getElementById('check-btn').remove();
  renderSentence();
  grade(isRight);
}

function onFlashReveal() {
  const q = currentQ;
  const slot = document.getElementById('flash-reveal');
  const back = el('div', { class: 'flash-back' });
  const ans = el('div', { class: 'flash-answer' });
  ans.textContent = q.raw[q.answerKey];
  back.appendChild(ans);
  if (q.raw.definition) {
    const def = el('div', { class: 'definition' });
    def.textContent = `„${q.raw.definition}"`;
    back.appendChild(def);
  }
  if (q.raw.exampleEn) {
    const block = el('div', { class: 'example-block' });
    const en = el('div', { class: 'example-en' });
    en.textContent = q.raw.exampleEn;
    block.appendChild(en);
    if (q.raw.exampleDe) {
      const de = el('div', { class: 'example-de' });
      de.textContent = q.raw.exampleDe;
      block.appendChild(de);
    }
    back.appendChild(block);
  }
  slot.appendChild(back);

  const action = document.getElementById('flash-action');
  const row = el('div', { class: 'btn-row', id: 'flash-action' });
  const noBtn = el('button', { class: 'btn btn-grade no', html: SVG_X + ' Wusste es nicht' });
  noBtn.addEventListener('click', () => onFlashGrade(false));
  const yesBtn = el('button', { class: 'btn btn-grade yes', html: SVG_CHECK + ' Konnte ich' });
  yesBtn.addEventListener('click', () => onFlashGrade(true));
  row.appendChild(noBtn);
  row.appendChild(yesBtn);
  action.replaceWith(row);
}

function onFlashGrade(knew) {
  const action = document.getElementById('flash-action');
  if (action) action.remove();
  grade(knew);
}

function showResult() {
  const q = currentQ;
  const slot = document.getElementById('result-slot');
  const showExample = q.raw.exampleEn && q.mode !== 'sentence' && q.mode !== 'flash';
  const result = el('div', { class: `result ${state.correct ? 'right' : 'wrong'}` });
  const text = el('div', { class: 'result-text' });
  text.innerHTML = state.correct ? SVG_SPARK + ' Hervorragend' : SVG_X + ' Nicht ganz';
  result.appendChild(text);
  if (showExample) {
    const ex = el('div', { class: 'result-example' });
    const en = el('div');
    en.textContent = q.raw.exampleEn;
    ex.appendChild(en);
    if (q.raw.exampleDe) {
      const de = el('div', { class: 'de' });
      de.textContent = q.raw.exampleDe;
      ex.appendChild(de);
    }
    result.appendChild(ex);
  }
  const cont = el('button', { class: 'continue' });
  cont.innerHTML = 'Weiter ' + SVG_RIGHT;
  cont.addEventListener('click', advance);
  result.appendChild(cont);
  slot.appendChild(result);
}

function advance() {
  if (phaseQueue.length === 0) {
    if (phase === 1) {
      startPhase2();
    } else {
      showFinish();
    }
    return;
  }
  const next = phaseQueue.shift();
  currentQ = generateQuestion(next);
  renderQuestion();
}

function startPhase1() {
  phase = 1;
  phaseQueue = buildPhase1Queue();
  phaseTotal = phaseQueue.length;
  phaseDone = 0;
  updatePhaseBar();
  showStageBanner('Phase I — Vokabeln', `Jedes der ${pool.length} Wörter wird in beide Richtungen geprüft, mit Auswahl, Tippen und Karteikarten.`, 'Los geht\'s', () => {
    const next = phaseQueue.shift();
    currentQ = generateQuestion(next);
    renderQuestion();
  });
}

function startPhase2() {
  phase = 2;
  phaseQueue = buildPhase2Queue();
  phaseTotal = phaseQueue.length;
  phaseDone = 0;
  updatePhaseBar();
  if (phaseTotal === 0) {
    showStageBanner('Keine Beispielsätze verfügbar', 'Für die geladenen Wörter konnten keine geeigneten Beispielsätze gefunden werden.', 'Frische Wörter ziehen', reloadPool);
    return;
  }
  showStageBanner('Phase II — Sätze bauen', `Jetzt baust du ${phaseTotal} Sätze zusammen — in beide Richtungen, aus den Wörtern die du gerade gelernt hast.`, 'Weiter', () => {
    const next = phaseQueue.shift();
    currentQ = generateQuestion(next);
    renderQuestion();
  });
}

function showFinish() {
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  const banner = el('div', { class: 'stage-banner' });
  const h2 = el('h2');
  h2.textContent = 'Sitzung abgeschlossen';
  banner.appendChild(h2);
  const p = el('p');
  p.textContent = `Beste Serie diese Sitzung: ${bestStreak}. Lade frische Wörter für eine neue Runde.`;
  banner.appendChild(p);
  const btn = el('button', { class: 'stage-btn' });
  btn.textContent = 'Frische Wörter laden';
  btn.addEventListener('click', reloadPool);
  banner.appendChild(btn);
  host.appendChild(banner);
}

function showStageBanner(title, message, btnText, onClick) {
  const host = document.getElementById('card-host');
  host.innerHTML = '';
  const banner = el('div', { class: 'stage-banner' });
  const h2 = el('h2');
  h2.textContent = title;
  banner.appendChild(h2);
  const p = el('p');
  p.textContent = message;
  banner.appendChild(p);
  const btn = el('button', { class: 'stage-btn' });
  btn.textContent = btnText;
  btn.addEventListener('click', onClick);
  banner.appendChild(btn);
  host.appendChild(banner);
}

function showView(name) {
  document.getElementById('loading-view').classList.toggle('hidden', name !== 'loading');
  document.getElementById('error-view').classList.toggle('hidden', name !== 'error');
  document.getElementById('app-view').classList.toggle('hidden', name !== 'app');
}

async function reloadPool() {
  showView('loading');
  document.getElementById('progress-done').textContent = 0;
  document.getElementById('progress-fill').style.width = '0%';
  setDetail('');
  try {
    pool = await buildPool(POOL_SIZE);
    if (pool.length < 4) {
      document.getElementById('error-msg').textContent = 'Konnte nicht genug Vokabeln laden. APIs scheinen langsam zu sein oder von hier blockiert. Erneut versuchen?';
      showView('error');
      return;
    }
    document.getElementById('pool-size').textContent = pool.length;
    showView('app');
    streak = 0;
    updateStats();
    startPhase1();
  } catch (e) {
    document.getElementById('error-msg').textContent = 'Etwas ist schiefgegangen: ' + (e?.message || 'unbekannter Fehler');
    showView('error');
  }
}

async function init() {
  showView('loading');
  document.getElementById('retry-btn').addEventListener('click', init);
  document.getElementById('refresh-btn').addEventListener('click', reloadPool);
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => { voicesReady = false; refreshVoices(); };
    refreshVoices();
  }
  await reloadPool();
}

init();
</script>
</body>
</html>
