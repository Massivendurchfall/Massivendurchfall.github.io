<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velora Slots</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="index.html">
        <div class="logo">◆</div>
        <div>
          <div class="brand-kicker">Arcade Casino</div>
          <div class="brand-title">Velora</div>
        </div>
      </a>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">💰 Coins</div>
          <div class="stat-value js-coins">15.000</div>
        </div>
        <div class="stat">
          <div class="stat-label">👑 Letzter Gewinn</div>
          <div class="stat-value js-lastwin">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">🎮 Spiele</div>
          <div class="stat-value">4</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn js-sound">🔊 Sound</button>
        <button class="btn btn-primary js-bonus">Bonus Coins</button>
      </div>
    </header>

    <nav class="nav">
      <a class="nav-btn" href="index.html">✨ Start</a>
      <a class="nav-btn" href="roulette.html">🎡 Roulette</a>
      <a class="nav-btn" href="blackjack.html">🃏 Blackjack</a>
      <a class="nav-btn active" href="slots.html">⭐ Slots</a>
      <a class="nav-btn" href="cases.html">💎 Case Opening</a>
    </nav>

    <section class="game-grid">
      <div class="panel game-panel" id="slotsPanel">
        <div class="panel-head">
          <div>
            <div class="section-kicker">Slots</div>
            <h2 class="section-title">Lucky 777</h2>
          </div>
          <div class="badge">Arcade Reel</div>
        </div>

        <div class="slots-machine">
          <div class="reels">
            <div class="reel" id="reel0">7</div>
            <div class="reel" id="reel1">7</div>
            <div class="reel" id="reel2">7</div>
          </div>
          <div class="slot-lights">
            <div class="light red"></div>
            <div class="light gold"></div>
            <div class="light green"></div>
          </div>
        </div>
      </div>

      <div class="panel game-panel">
        <div class="panel-head">
          <div>
            <div class="section-kicker">Spin Setup</div>
            <h2 class="section-title">Walzen</h2>
          </div>
        </div>

        <div class="control-box">
          <div class="control-top">
            <span>Einsatz</span>
            <strong id="betValue">200</strong>
          </div>
          <input type="range" id="betInput" min="50" max="2500" step="50" value="200" />
        </div>

        <div class="preset-grid">
          <button class="btn" data-preset="100">100</button>
          <button class="btn" data-preset="250">250</button>
          <button class="btn" data-preset="500">500</button>
        </div>

        <button class="btn btn-primary" id="spinBtn" style="width:100%; margin-top:14px; height:58px; font-size:18px;">Spin</button>

        <div class="payout-list">
          <div class="section-kicker" style="margin-bottom:10px;">Auszahlung</div>
          <div class="payout-row"><span>Drei mal 7</span><strong>12x</strong></div>
          <div class="payout-row"><span>Drei gleiche</span><strong>6x</strong></div>
          <div class="payout-row"><span>Zwei gleiche</span><strong>2x</strong></div>
        </div>
      </div>
    </section>

    <div class="footer-note">Nur Spielcoins. Kein Echtgeld. Alles lokal im Browser.</div>
  </div>

  <script>
    const stateKey = 'velora_state_v1';
    const icons = ['7', '♦', '★', '♣', '♠', '💎'];
    let spinning = false;

    function getState() {
      const raw = localStorage.getItem(stateKey);
      if (raw) return JSON.parse(raw);
      return { coins: 15000, lastWin: 0, soundOn: true, history: [{ text: 'Willkommen', amount: 0 }], inventory: [] };
    }

    function setState(next) {
      localStorage.setItem(stateKey, JSON.stringify(next));
    }

    function formatCoins(value) {
      return new Intl.NumberFormat('de-DE').format(value);
    }

    function syncHeader() {
      const state = getState();
      document.querySelectorAll('.js-coins').forEach(el => el.textContent = formatCoins(state.coins));
      document.querySelectorAll('.js-lastwin').forEach(el => el.textContent = formatCoins(state.lastWin));
      document.querySelectorAll('.js-sound').forEach(el => el.textContent = state.soundOn ? '🔊 Sound' : '🔇 Sound');
    }

    function beep(frequency = 500, duration = 0.06, type = 'sine', volume = 0.03) {
      const state = getState();
      if (!state.soundOn) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!window.veloraAudio) window.veloraAudio = new AudioContextClass();
      const ctx = window.veloraAudio;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = frequency;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const start = ctx.currentTime;
      osc.start(start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.stop(start + duration);
    }

    function soundClick() { beep(420, 0.03, 'square', 0.02); }
    function soundSpin() { beep(340, 0.03, 'square', 0.015); setTimeout(() => beep(380, 0.03, 'square', 0.015), 50); setTimeout(() => beep(420, 0.03, 'square', 0.015), 100); }
    function soundWin() { beep(660, 0.06, 'triangle', 0.03); setTimeout(() => beep(880, 0.08, 'triangle', 0.03), 80); setTimeout(() => beep(1200, 0.1, 'triangle', 0.03), 170); }
    function soundLose() { beep(220, 0.08, 'sawtooth', 0.02); setTimeout(() => beep(180, 0.1, 'sawtooth', 0.02), 90); }

    document.querySelectorAll('.js-sound').forEach(btn => btn.addEventListener('click', () => {
      const state = getState();
      state.soundOn = !state.soundOn;
      setState(state);
      syncHeader();
    }));

    document.querySelectorAll('.js-bonus').forEach(btn => btn.addEventListener('click', () => {
      const state = getState();
      state.coins += 5000;
      state.lastWin = 5000;
      state.history.unshift({ text: 'Bonus', amount: 5000 });
      state.history = state.history.slice(0, 10);
      setState(state);
      syncHeader();
      soundWin();
    }));

    const betInput = document.getElementById('betInput');
    const betValue = document.getElementById('betValue');
    const spinBtn = document.getElementById('spinBtn');
    const reels = [document.getElementById('reel0'), document.getElementById('reel1'), document.getElementById('reel2')];
    const slotsPanel = document.getElementById('slotsPanel');

    betInput.addEventListener('input', event => {
      betValue.textContent = formatCoins(Number(event.target.value));
    });

    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        betInput.value = btn.dataset.preset;
        betValue.textContent = formatCoins(Number(btn.dataset.preset));
        soundClick();
      });
    });

    function randomIcon() {
      return icons[Math.floor(Math.random() * icons.length)];
    }

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      const state = getState();
      const bet = Number(betInput.value);
      if (bet > state.coins || bet <= 0) return;

      spinning = true;
      spinBtn.disabled = true;
      spinBtn.textContent = 'Rolling';
      slotsPanel.classList.remove('slots-win');
      soundSpin();
      reels.forEach(reel => reel.classList.add('spin'));

      const final = [randomIcon(), randomIcon(), randomIcon()];
      let ticks = 0;
      const interval = setInterval(() => {
        ticks += 1;
        reels.forEach(reel => reel.textContent = randomIcon());
        if (ticks > 14) {
          clearInterval(interval);
          reels.forEach((reel, index) => {
            reel.classList.remove('spin');
            reel.textContent = final[index];
          });
          const counts = {};
          final.forEach(icon => counts[icon] = (counts[icon] || 0) + 1);
          const sorted = Object.values(counts).sort((a, b) => b - a);
          let multiplier = 0;
          if (sorted[0] === 3) multiplier = final[0] === '7' ? 12 : 6;
          else if (sorted[0] === 2) multiplier = 2;
          const delta = multiplier > 0 ? bet * (multiplier - 1) : -bet;
          state.coins = Math.max(0, state.coins + delta);
          if (delta > 0) state.lastWin = delta;
          state.history.unshift({ text: delta > 0 ? 'Slots Gewinn' : 'Slots Verlust', amount: delta });
          state.history = state.history.slice(0, 10);
          setState(state);
          syncHeader();
          if (delta > 0) {
            slotsPanel.classList.add('slots-win');
            soundWin();
          } else {
            soundLose();
          }
          spinning = false;
          spinBtn.disabled = false;
          spinBtn.textContent = 'Spin';
        }
      }, 100);
    });

    syncHeader();
  </script>
</body>
</html>
